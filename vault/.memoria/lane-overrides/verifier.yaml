profile: memoria-verifier

# Allowlist wired to real Hermes skill IDs — adapt-not-wrap (2026-05-31).
# See https://eranroseman.github.io/memoria-vault/reference/installer/ § skills.

policy:
  allow:
    skills:
      - qmd                 # similarity-check + find-duplicates (hybrid BM25+vector vault search; skills.sh skill)
      - retraction-check    # authored skill: open-retractions API + crossref + pyzotero
      - pyzotero            # retraction-check + cite-check: resolve citekeys / Zotero items
      - obsidian            # read vault + write verification reports / candidate cards
      # cite-check is a SOUL.md procedure: resolve every citekey against .bib + paper notes.
    write:
      - "40-workbench/*/05-verification/**"
      - "10-inbox/03-candidates/**"   # gap candidate-notes only (type: candidate-note, source: gap)
  deny:
    skills:
      - review_gated_publish
    write:
      - "20-sources/**"
      - "30-synthesis/**"
      - "40-workbench/*/04-drafts/**" # no edits to the thing being verified
      - "50-deliverables/**"
  require:
    - audit_log
    - timeout_required
    - read_only_mode                  # enforced vault-wide except verification paths above

routing:
  invocation: dispatched
  external_api_policy: explicit_only  # blocked | explicit_only | open (search_web, fetch_url for retraction checks)
  write_scope:
    - "40-workbench/*/05-verification/"
    - "10-inbox/03-candidates/"