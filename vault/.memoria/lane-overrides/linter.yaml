profile: memoria-linter

# Allowlist wired to real Hermes skill IDs — adapt-not-wrap (2026-05-31).
# See https://eranroseman.github.io/memoria-vault/reference/installer/ § skills.

policy:
  allow:
    # The Linter's checks are deterministic; the model contributes no judgment. Its one
    # skill, structural-detectors, wraps the zero-LLM engine (scripts/detectors.py, pure-stdlib,
    # report-only, run via the terminal capability) and the drift-detection procedures. The
    # skill is the discoverable, cron-dispatchable unit — packaging it changes nothing about
    # determinism. schema-check, the health-report verdict, and graph-analyze (orphan detection)
    # live in detectors.py; session-log writes the per-session log. No other skill deps.
    # (Advanced graph community-detection could reintroduce networkx later.)
    skills:
      - structural-detectors
    write:
      - "99-system/logs/**"     # audit logs, session logs, and rotation archive
    auto_fix:
      classes:
        - safe-and-unambiguous   # trailing whitespace, missing timestamps — via Templater
        - authorized-targeted    # audit-log rotation, lint-findings file, dashboard last_updated
  deny:
    skills:
      - review_gated_publish
    write:
      - "10-inbox/**"
      - "20-sources/**"
      - "30-synthesis/**"        # review-gated zones — always deny (policy MCP forces dry_run)
      - "40-workbench/**"
      - "50-deliverables/**"
    auto_fix:
      classes:
        - schema-content          # always dry_run — needs schema-migrate
        - review-gated-edit       # always deny regardless of class
  require:
    - audit_log
    - dry_run_default             # dry-run is the default; auto_fix is class-gated

routing:
  invocation: dispatched         # dispatched | interactive_only (also runs on cron: Level 1)
  external_api_policy: blocked   # blocked | explicit_only | open
  write_scope:
    - "99-system/logs/"
