profile: memoria-linter

# Allowlist wired to real Hermes skill IDs — adapt-not-wrap (2026-05-31).
# See project-files/proposals/bootstrap-installer.md § skills.

policy:
  allow:
    # The Linter invokes NO Hermes skills: every check is the shipped detectors.py tool
    # (zero-LLM, pure-stdlib, report-only), run via the profile's terminal capability.
    # schema-check, the health-report verdict, and graph-analyze (orphan detection) are
    # all implemented in detectors.py; session-log writes the per-session log. No external
    # skill deps. (Advanced graph community-detection could reintroduce networkx later.)
    skills: []
    write:
      - "00-meta/02-logs/**"     # audit logs, session logs, and rotation archive
    auto_fix:
      classes:
        - safe-and-unambiguous   # trailing whitespace, missing timestamps — via Templater
        - authorized-targeted    # audit-log rotation, lint-findings file, dashboard last_updated
  deny:
    skills:
      - review_gated_publish
    write:
      - "10-inbox/**"
      - "20-sources/**"
      - "30-synthesis/**"        # review-gated zones — always deny (policy MCP forces dry_run)
      - "40-workbench/**"
      - "50-deliverables/**"
    auto_fix:
      classes:
        - schema-content          # always dry_run — needs schema-migrate
        - review-gated-edit       # always deny regardless of class
  require:
    - audit_log
    - dry_run_default             # dry-run is the default; auto_fix is class-gated

routing:
  invocation: dispatched         # dispatched | interactive_only (also runs on cron: Level 1)
  external_api_policy: blocked   # blocked | explicit_only | open
  write_scope:
    - "00-meta/02-logs/"