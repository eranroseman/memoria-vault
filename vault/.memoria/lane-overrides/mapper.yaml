profile: memoria-mapper

# Allowlist wired to real Hermes/K-Dense skill IDs — adapt-not-wrap (2026-05-31).
# See https://eranroseman.github.io/memoria-vault/reference/installer/ § skills.

policy:
  allow:
    skills:
      # scope-project / gap-report / cluster-mapping are SOUL.md
      # procedures composing these real skills:
      - obsidian            # vault query + write corpus-map / gap-report / cluster-maps
      - qmd                 # hybrid BM25+vector retrieval for gap-report + corpus retrieval (skills.sh skill)
      - scikit-learn        # HDBSCAN clustering + topic modeling (K-Dense)
      - umap-learn          # cluster-map dimensionality reduction (K-Dense)
      - cluster-mapping     # Mapper packaged skill: scope-project / gap-report / cluster-map procedures
    write:
      - "40-workbench/*/01-map/corpus-map.md"
      - "40-workbench/*/01-map/gap-report.md"
      - "40-workbench/*/01-map/cluster-maps/**"
  deny:
    skills: []
    write:
      - "10-inbox/**"
      - "20-sources/**"
      - "30-synthesis/**"
      - "50-deliverables/**"
  require:
    - audit_log
    - timeout_required
    - read_only_mode         # enforced vault-wide except project-scratch write paths above

routing:
  invocation: dispatched
  external_api_policy: blocked          # blocked | explicit_only | open
  write_scope:
    - "40-workbench/*/01-map/"
