profile: memoria-librarian

# Allowlist wired to real Hermes/K-Dense skill IDs — adapt-not-wrap (2026-05-31).
# See project-files/proposals/bootstrap-installer.md § skills.

policy:
  allow:
    skills:
      - paper-lookup           # K-Dense
      - arxiv                  # was arxiv-search (official research/arxiv)
      - pyzotero               # K-Dense
      - citation-management    # K-Dense
      - literature-review      # K-Dense
      - obsidian-paper-note    # authored skill: ingest pipeline (ocr-and-documents + pyzotero + obsidian)
      - ocr-and-documents      # PDF/OCR extraction for ingest (official productivity/)
      - obsidian               # vault read/write for ingest
      - qmd                    # the `query` command (hybrid BM25+vector vault search; skills.sh skill)
      - rest-passthrough       # capability token (REST passthrough), not a skill
    write:
      - "10-inbox/01-fleeting/**"      # discovery captures
      - "10-inbox/03-candidates/**"    # discovery candidates (02-answers is the Writer's)
      - "20-sources/**"
  deny:
    skills:
      - review_gated_publish
      - destructive_shell
    write:
      - "30-synthesis/**"
      - "40-workbench/**"
      - "50-deliverables/**"
  require:
    - audit_log
    - timeout_required
    - source_tracking

routing:
  invocation: dispatched
  external_api_policy: explicit_only    # blocked | explicit_only | open
  write_scope:
    - "10-inbox/01-fleeting/"
    - "10-inbox/03-candidates/"
    - "20-sources/"