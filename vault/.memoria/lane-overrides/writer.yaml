profile: memoria-writer

# Allowlist wired to real Hermes/K-Dense skill IDs — adapt-not-wrap (2026-05-31).
# See project-files/proposals/bootstrap-installer.md § skills.

policy:
  allow:
    skills:
      - llm-wiki             # was llm-wiki-draft (official research/llm-wiki)
      - obsidian-markdown    # note-refactor (kepano obsidian-skills)
      - obsidian             # vault read/write for drafts / answers / framing
      - scientific-writing   # K-Dense
      - qmd                  # the `query` step (hybrid BM25+vector vault search; skills.sh skill)
      # counter-outline is a SOUL.md behavior (produce 2–3 competing outlines), not a tool skill.
    write:
      - "10-inbox/02-answers/**"
      - "40-workbench/*/04-drafts/**"
      - "40-workbench/*/03-canvas/**"
      - "40-workbench/*/02-framing/**"
      - "30-synthesis/02-reference/**"   # review-gated → policy MCP degrades to dry_run (human-approved)
      - "50-deliverables/**"             # review-gated export → degrades to dry_run
  deny:
    skills:
      - rest-passthrough
    write:
      - "20-sources/**"
      - "30-synthesis/01-claims/**"    # claims are human-owned — hard deny (not Writer's to propose)
      - "30-synthesis/03-moc/**"       # MOCs are human-owned — hard deny (Writer suggests via comment, not write)
  require:
    - audit_log
    - timeout_required
    - review_gated_write               # writes to review-gated zones degrade to dry_run

routing:
  invocation: dispatched
  external_api_policy: blocked          # blocked | explicit_only | open
  write_scope:
    - "10-inbox/02-answers/"
    - "40-workbench/*/04-drafts/"
    - "40-workbench/*/03-canvas/"
    - "40-workbench/*/02-framing/"