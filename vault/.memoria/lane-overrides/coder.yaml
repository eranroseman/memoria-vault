profile: memoria-coder

# Allowlist wired to real Hermes skill IDs — adapt-not-wrap (2026-05-31).
# See https://eranroseman.github.io/memoria-vault/reference/installer/ § skills.

policy:
  allow:
    skills:
      # was scaffold-code-note / workspace-coordinate / commit-and-document (coined wrappers).
      # scaffold-code-note's human path is a QuickAdd command; the agent scaffolds via `obsidian` + template.
      - obsidian                 # vault read/write for the code-note
      - codex                    # external coding agent (autonomous-ai-agents)
      - claude-code              # external coding agent (use whichever is configured; opencode also available)
      - github-repo-management   # per-task git commit / repo APIs
    write:
      - "40-workbench/*/06-code/**"
  deny:
    skills:
      - review_gated_publish
    write:
      - "10-inbox/**"
      - "20-sources/**"
      - "30-synthesis/**"
      - "40-workbench/*/04-drafts/**"
      - "50-deliverables/**"
  require:
    - audit_log
    - timeout_required
    - source_tracking

routing:
  invocation: dispatched         # dispatched | interactive_only (external agent handoff)
  external_api_policy: explicit_only  # blocked | explicit_only | open (Git, repo APIs)
  write_scope:
    - "40-workbench/*/06-code/"
