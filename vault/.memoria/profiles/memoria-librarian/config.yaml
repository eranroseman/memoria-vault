# memoria-librarian — find and ingest evidence
# Per-profile Hermes config. Hermes reads model / mcp_servers / agent / terminal /
# checkpoints / hooks from THIS file (ADR-27). The installer substitutes the
# {{PYTHON}} interpreter and {{VAULT_PATH}} at deploy time.
# Recommended: set agent.reasoning_effort per lane via `hermes -p memoria-librarian config set`.
model:
  provider: kilocode
  base_url: https://api.kilo.ai/api/gateway
  default: ~anthropic/claude-haiku-latest

# Vault access + policy gate run as MCP servers — loaded ONLY from config.yaml
# mcp_servers (a standalone mcp.json is never read by Hermes; ADR-27 finding 1).
mcp_servers:
  policy:
    command: "{{PYTHON}}"
    args: ["{{VAULT_PATH}}/.memoria/mcp/policy_mcp.py", "--vault", "{{VAULT_PATH}}"]
    timeout: 30
  ingest:
    # The deterministic ingest pipeline (ADR-30) — the Librarian can't exec scripts
    # (code_execution disabled), so the pipeline is reached over MCP. Read+compute
    # only; the agent fills the two holes and writes via the gated obsidian MCP.
    # Generous timeout: enrich makes throttled scholarly-API calls + extraction.
    command: "{{PYTHON}}"
    args: ["{{VAULT_PATH}}/.memoria/mcp/ingest_mcp.py", "--vault", "{{VAULT_PATH}}"]
    timeout: 180
  obsidian:
    command: uvx
    args: ["mcp-obsidian"]
    timeout: 30
    env:
      OBSIDIAN_API_KEY: "${OBSIDIAN_API_KEY}"
      OBSIDIAN_HOST: "127.0.0.1"
      OBSIDIAN_PORT: "27124"

# Capability allowlist (ADR-27): keep toolsets = skills, todo, web (+ obsidian/policy via
# MCP). disabled_toolsets = every Hermes toolset NOT in the keep-set, so the only
# vault-write path is the gated obsidian MCP. Update if Hermes adds toolsets.
agent:
  disabled_toolsets: [browser, clarify, code_execution, computer_use, cronjob, delegation, file, homeassistant, image_gen, memory, messaging, moa, session_search, spotify, terminal, tts, video, video_gen, vision, x_search, yuanbao]

# Profiles do not sandbox (ADR-27); anchor stray file ops inside the vault.
terminal:
  cwd: "{{VAULT_PATH}}"

# Shadow-git snapshot before destructive writes — mode-independent reversibility.
checkpoints:
  enabled: true

# Write gate (ADR-28): the policy gate is a Python PLUGIN, not a shell hook.
# Hermes registers MCP tools as mcp_<server>_<tool>, so the obsidian write is
# mcp_obsidian_obsidian_append_content; a shell hook (re.fullmatch "obsidian.*",
# consent-gated, fail-OPEN) never fired. The plugin runs in-process in every mode
# (-z/gateway/cron/ACP), matches in Python, gets the task_id, and is fail-CLOSED.
# Deployed per lane by the installer (deploy_policy_plugin); see .memoria/plugins/.
plugins:
  enabled:
    - memoria-policy-gate
