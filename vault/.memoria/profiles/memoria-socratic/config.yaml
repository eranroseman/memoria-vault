# memoria-socratic — question without producing (interactive; hard write-denied).
# Per-profile override: sets ONLY the full model block (Hermes replaces sections wholesale).
# Schema: hermes-agent.nousresearch.com/docs/user-guide/configuration
#
# Recommended agent.reasoning_effort: high  (pure reasoning, low volume, zero write-risk).
#   hermes -p memoria-socratic config set agent.reasoning_effort high
model:
  provider: kilocode
  base_url: https://api.kilo.ai/api/gateway
  default: ~anthropic/claude-opus-latest

# Route obsidian-MCP vault writes through the policy gate (Socratic is hard write-denied).
hooks:
  pre_tool_call:
    - matcher: "obsidian"
      command: "python {{VAULT_PATH}}/.memoria/mcp/policy_hook.py --profile memoria-socratic"
      timeout: 10
  post_tool_call:                       # completes the audit record with after_hash (reversibility)
    - matcher: "obsidian"
      command: "python {{VAULT_PATH}}/.memoria/mcp/policy_hook.py --profile memoria-socratic"
      timeout: 10
