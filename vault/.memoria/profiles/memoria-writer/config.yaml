# memoria-writer — draft and synthesize (answers, drafts, framing, canvas).
# Per-profile override: sets ONLY the full model block (Hermes replaces sections wholesale).
# Schema: hermes-agent.nousresearch.com/docs/user-guide/configuration
#
# Recommended agent.reasoning_effort: medium  (drafting workhorse, higher volume).
#   hermes -p memoria-writer config set agent.reasoning_effort medium
model:
  provider: kilocode
  base_url: https://api.kilo.ai/api/gateway
  default: ~anthropic/claude-sonnet-latest

# Route obsidian-MCP vault writes through the policy gate (review-gated drafts -> dry_run).
hooks:
  pre_tool_call:
    - matcher: "obsidian.*"
      command: "python {{VAULT_PATH}}/.memoria/mcp/policy_hook.py --profile memoria-writer"
      timeout: 10
  post_tool_call:                       # completes the audit record with after_hash (reversibility)
    - matcher: "obsidian.*"
      command: "python {{VAULT_PATH}}/.memoria/mcp/policy_hook.py --profile memoria-writer"
      timeout: 10
