# Hermes profile manifest. Read by `hermes profile install`; env_requires -> .env.EXAMPLE.
# Schema: hermes-agent.nousresearch.com/docs/user-guide/profile-distributions
name: memoria-linter
version: 0.2.0
description: "Memoria Linter — runs deterministic structural detectors on cron; writes audit/session logs to 00-meta/02-logs/."
author: "Memoria"
hermes_requires: ">=0.12.0"
env_requires:
  - name: ANTHROPIC_API_KEY
    description: "Anthropic API key (model access for provider: anthropic)."
    required: true
  - name: OBSIDIAN_API_KEY
    description: "Obsidian Local REST API key (64-char hex) — log writes to 00-meta/02-logs/ via the `obsidian` MCP server."
    required: true
