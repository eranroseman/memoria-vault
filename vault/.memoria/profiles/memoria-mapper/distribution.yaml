# Hermes profile manifest. Read by `hermes profile install`; env_requires -> .env.EXAMPLE.
# Schema: hermes-agent.nousresearch.com/docs/user-guide/profile-distributions
name: memoria-mapper
version: 0.2.0
description: "Memoria Mapper — writes corpus-maps, gap-reports, cluster-maps, and comparative briefs to 40-workbench/*/01-map/."
author: "Memoria"
hermes_requires: ">=0.12.0"
env_requires:
  - name: ANTHROPIC_API_KEY
    description: "Anthropic API key (model access for provider: anthropic)."
    required: true
  - name: OBSIDIAN_API_KEY
    description: "Obsidian Local REST API key (64-char hex) — vault read (and project-scratch writes) via the `obsidian` MCP server."
    required: true
