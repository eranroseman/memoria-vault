# Hermes profile manifest. Read by `hermes profile install`; env_requires -> .env.EXAMPLE.
# Schema: hermes-agent.nousresearch.com/docs/user-guide/profile-distributions
name: memoria-coder
version: 0.2.0
description: "Memoria Coder — scaffolds code notes, coordinates the external coding agent, and commits in 40-workbench/*/06-code/."
author: "Memoria"
hermes_requires: ">=0.12.0"
env_requires:
  - name: ANTHROPIC_API_KEY
    description: "Anthropic API key (model access for provider: anthropic)."
    required: true
  - name: OBSIDIAN_API_KEY
    description: "Obsidian Local REST API key (64-char hex) — code-note read/write via the `obsidian` MCP server."
    required: true
  - name: GITHUB_TOKEN
    description: "GitHub token — repo APIs for the external coding-agent handoff (push/PR). Optional for local-only work."
    required: false
    default: ""
