title: Memoria
description: A research operating system — a Co-PI and four bounded background agents inside your Obsidian vault.
remote_theme: just-the-docs/just-the-docs

url: https://eranroseman.github.io
baseurl: /memoria-vault

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Top-right link
aux_links:
  "GitHub":
    - "https://github.com/eranroseman/memoria-vault"
aux_links_new_tab: true

# Footer
footer_content: 'MIT License &middot; <a href="https://github.com/eranroseman/memoria-vault">eranroseman/memoria-vault</a>'

# Back to top button
back_to_top: true
back_to_top_text: "Back to top"

# Color scheme: "light" or "dark"
color_scheme: light

# Favicon
favicon_ico: "/favicon.ico"

# Plugins whitelisted on GitHub Pages
plugins:
  - jekyll-seo-tag

# Repo-internal documentation, kept in docs/ for relative linking but NOT
# published to the site. The public site is the four Diátaxis quadrants
# (tutorials/ how-to-guides/ reference/ explanation/) plus the ADRs.
exclude:
  - adr/
  - contributing/
  - releasing/
  - testing/
  # Scratch dirs anywhere under docs/ (e.g. a release folder's tmp/): tracked in
  # git for relative linking, never published.
  - "**/tmp/"
