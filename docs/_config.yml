title: Memoria
description: A research operating system — seven AI agents inside your Obsidian vault, under a human approval gate.
remote_theme: just-the-docs/just-the-docs

url: https://eranroseman.github.io
baseurl: /memoria-vault
permalink: pretty   # content pages get trailing-slash URLs (…/page/), matching the vault's links

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Top-right link
aux_links:
  "GitHub":
    - "https://github.com/eranroseman/memoria-vault"
aux_links_new_tab: true

# Footer
footer_content: 'MIT License &middot; <a href="https://github.com/eranroseman/memoria-vault">eranroseman/memoria-vault</a>'

# Back to top button
back_to_top: true
back_to_top_text: "Back to top"

# Color scheme: "light" or "dark"
color_scheme: light

# Favicon
favicon_ico: "/favicon.ico"

# Plugins whitelisted on GitHub Pages
plugins:
  - jekyll-seo-tag
