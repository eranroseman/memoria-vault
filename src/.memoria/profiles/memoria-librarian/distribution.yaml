# Hermes profile manifest. Read by `hermes profile install`; its env_requires
# block is what Hermes writes out as .env.EXAMPLE (scripts/install.ps1 then copies that
# to .env on first install). Schema: hermes-agent.nousresearch.com/docs/user-guide/profile-distributions
name: memoria-librarian
version: 0.1.1
description: "Memoria Librarian — finds, ingests, enriches, and draft-classifies evidence into inbox/ and catalog/."
author: "Memoria"
license: "MIT"
hermes_requires: ">=0.12.0"
env_requires:
  - name: KILOCODE_API_KEY
    description: "Kilo Code API key (kilo.ai) - model access for the shipped provider: kilocode."
    required: true
  - name: ANTHROPIC_API_KEY
    description: "Only needed if you switch config.yaml to provider: anthropic; unused by the shipped kilocode config."
    required: false
    default: ""
  - name: OBSIDIAN_API_KEY
    description: "Obsidian Local REST API key (64-char hex from the plugin) — vault read/write via the `obsidian` MCP server."
    required: true
  - name: OBSIDIAN_MCP_PORT
    description: "Port of the Local REST API plugin's insecure HTTP server, where its native MCP is served (http://127.0.0.1:<port>/mcp). Must match insecurePort in the plugin's data.json (default 27123). Give a sandbox and a production vault distinct ports so both run at once (ADR-31)."
    required: false
    default: "27123"
  - name: OPENALEX_API_KEY
    description: "OpenAlex API key (openalex.org/settings/api), sent as the ?api_key= query param — enrichment (citation count, abstract, OA status) at ingest, read by the `paper-lookup` skill. As of 2026-02 OpenAlex requires a key; the former polite-pool contact email (OPENALEX_EMAIL) is discontinued."
    required: true
  - name: S2_API_KEY
    description: "Semantic Scholar API key (x-api-key header) — read by `paper-lookup` for higher rate limits; works without it on a shared pool. NOTE: the var is S2_API_KEY, not SEMANTIC_SCHOLAR_API_KEY."
    required: false
    default: ""
  - name: NCBI_API_KEY
    description: "NCBI E-utilities key (ncbi.nlm.nih.gov/account/settings), sent as &api_key= — read by `paper-lookup` and `citation-management` for PubMed/PMC (10 req/s vs 3 without). NOTE: the var is NCBI_API_KEY, not PUBMED_API_KEY."
    required: false
    default: ""
  - name: NCBI_EMAIL
    description: "Contact email for NCBI E-utilities (Entrez requires it) — read by `citation-management`; the agent also reuses it as the Crossref `mailto` (polite pool) and the Unpaywall `email` param (Unpaywall rejects placeholder addresses)."
    required: false
    default: ""
  # Zotero: the `pyzotero` skill runs in local read-only mode against the Zotero
  # desktop API (http://localhost:23119) — no ZOTERO_API_KEY / _LIBRARY_ID /
  # _LIBRARY_TYPE needed. Add a Web API key only if you switch to the cloud API.
