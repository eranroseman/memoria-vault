# memoria-librarian — find and ingest evidence
# Per-profile Hermes config. Hermes reads model / mcp_servers / agent / terminal /
# plugins from THIS file (ADR-27). The installer substitutes the
# Python, vault, qmd, and model tokens at deploy time.
# Recommended: set agent.reasoning_effort per lane via `hermes -p memoria-librarian config set`.
model:
  provider: "{{MODEL_PROVIDER}}"
  base_url: "{{MODEL_BASE_URL}}"
  default: "{{MODEL_DEFAULT}}"
  # {{MODEL_LOCAL_CONTEXT}}

# Vault access + policy gate run as MCP servers — loaded ONLY from config.yaml
# mcp_servers (a standalone mcp.json is never read by Hermes; ADR-27 finding 1).
mcp_servers:
  policy:
    command: "{{PYTHON}}"
    args: ["{{VAULT_PATH}}/.memoria/mcp/policy_mcp.py", "--vault", "{{VAULT_PATH}}"]
    timeout: 30
    tools:
      include: [check_permission, complete_write]
  ingest:
    # The deterministic ingest pipeline (ADR-30) — the Librarian can't exec scripts
    # (code_execution disabled), so the pipeline is reached over MCP. Read+compute
    # only; the agent fills the two holes and writes via the gated obsidian MCP.
    # Generous timeout: enrich makes throttled scholarly-API calls + extraction.
    command: "{{PYTHON}}"
    args: ["{{VAULT_PATH}}/.memoria/mcp/ingest_mcp.py", "--vault", "{{VAULT_PATH}}"]
    timeout: 180
    tools:
      include: [ingest_pipeline]
  obsidian:
    # Native MCP from the Local REST API plugin over HTTPS (loopback). Replaces uvx
    # mcp-obsidian, which hardwired port 27124; the port lives in OBSIDIAN_MCP_PORT
    # (~/.hermes/.env) so a sandbox + a production vault can serve different ports
    # and coexist. OBSIDIAN_MCP_SSL_VERIFY points Hermes at the plugin's exported
    # PEM cert/CA bundle. The exact `Authorization: Bearer` header is required by
    # the plugin.
    url: "https://127.0.0.1:${OBSIDIAN_MCP_PORT}/mcp"
    ssl_verify: "${OBSIDIAN_MCP_SSL_VERIFY}"
    timeout: 30
    headers:
      Authorization: "Bearer ${OBSIDIAN_API_KEY}"
  cluster:
    # The clustering operation (ADR-33): typed graph + topics for the map lane.
    command: "{{PYTHON}}"
    args: ["{{VAULT_PATH}}/.memoria/mcp/cluster_mcp.py", "--vault", "{{VAULT_PATH}}"]
    timeout: 120
    tools:
      include: [cluster_build_graph, cluster_model_topics, cluster_emit_canvas]
  patterns:
    # The pattern runner (ADR-53): one audited chokepoint for every pattern run.
    command: "{{PYTHON}}"
    args: ["{{VAULT_PATH}}/.memoria/mcp/patterns_mcp.py", "--vault", "{{VAULT_PATH}}"]
    timeout: 60
    tools:
      include: [patterns_list, patterns_run]
  paper_search:
    # Scholarly discovery across 20+ databases (openags/paper-search-mcp) — the MCP
    # backend for `find`, replacing the K-Dense paper-lookup/arxiv web-fetch skills.
    # Use the search_* tools only; PDF retrieval + extraction is the ingest pipeline's
    # job (Marker via the ingest MCP), so the download_* / read_paper tools — and the
    # optional Sci-Hub fallback inside download_with_fallback — are NOT used.
    # Install once: pip install paper-search-mcp.
    command: "{{PYTHON}}"
    args: ["-m", "paper_search_mcp.server"]
    timeout: 60
    env:
      PAPER_SEARCH_MCP_UNPAYWALL_EMAIL: "${NCBI_EMAIL}"
      PAPER_SEARCH_MCP_SEMANTIC_SCHOLAR_API_KEY: "${S2_API_KEY}"
    tools:
      include: [search_arxiv, search_pubmed, search_biorxiv, search_medrxiv, search_google_scholar, search_semantic]
  pyzotero:
    # Upstream read-only Zotero MCP (Zotero 7 local API at localhost:23119) — citekey /
    # metadata resolution for ingest reads. Memoria uses Zotero read-only (the local API
    # has no write path), so this fully replaces the pyzotero web-fetch skill — there is
    # no Zotero write-back. Install once: pip install "pyzotero[mcp]".
    command: "pyzotero-mcp"
    timeout: 30
    tools:
      include: [get_references, get_citations, find_related, search_semantic_scholar]
  qmd:
    # The shared qmd vector index (tobi/qmd) — local hybrid search (BM25 + vector +
    # rerank) over the vault corpus; the similarity primitive the catalog/link/map
    # skills lean on for the comparative [!brief] and neighbour selection.
    # Memoria serves it through qmd_filter_mcp.py so superseded claims are hidden
    # by default (ADR-10). Read-only — qmd never writes the vault. Requires a
    # one-time index: `qmd collection add <vault> --name vault && qmd embed`.
    command: "{{PYTHON}}"
    args: ["{{VAULT_PATH}}/.memoria/mcp/qmd_filter_mcp.py", "--vault", "{{VAULT_PATH}}", "--qmd", "{{QMD}}"]
    timeout: 30
    connect_timeout: 45
    tools:
      include: [search, vsearch, deep_search, get, status]

# Progressive tool catalog: keep MCP-heavy profiles cheap without hiding tools forever.
tools:
  tool_search:
    enabled: auto

# Worker lanes are stateless; Co-PI is the only Memoria profile with Hermes memory.
memory:
  memory_enabled: false
  user_profile_enabled: false
  write_approval: true
  provider: ""

skills:
  write_approval: true
  guard_agent_created: true

curator:
  enabled: false

# Positive platform allowlist. `web` stays off: discovery goes through
# paper_search MCP; enrichment/extract goes through ingest MCP; vault search is qmd.
platform_toolsets:
  cli: &memoria_librarian_toolsets [skills, todo, policy, ingest, obsidian, cluster, patterns, paper_search, pyzotero, qmd]
  cron: *memoria_librarian_toolsets
  api_server: *memoria_librarian_toolsets
  telegram: *memoria_librarian_toolsets
  discord: *memoria_librarian_toolsets
  slack: *memoria_librarian_toolsets
  whatsapp: *memoria_librarian_toolsets
  whatsapp_cloud: *memoria_librarian_toolsets
  signal: *memoria_librarian_toolsets
  bluebubbles: *memoria_librarian_toolsets
  email: *memoria_librarian_toolsets
  homeassistant: *memoria_librarian_toolsets
  mattermost: *memoria_librarian_toolsets
  matrix: *memoria_librarian_toolsets
  dingtalk: *memoria_librarian_toolsets
  feishu: *memoria_librarian_toolsets
  wecom: *memoria_librarian_toolsets
  wecom_callback: *memoria_librarian_toolsets
  qqbot: *memoria_librarian_toolsets
  yuanbao: *memoria_librarian_toolsets
  teams: *memoria_librarian_toolsets
  google_chat: *memoria_librarian_toolsets

# Backstop only: platform_toolsets is the primary allowlist; this strips known
# direct-world families if a runtime path falls back to Hermes defaults.
agent:
  tool_use_enforcement: true
  disabled_toolsets: [browser, clarify, code_execution, computer_use, cronjob, delegation, file, homeassistant, image_gen, memory, messaging, moa, session_search, spotify, terminal, tts, video, video_gen, vision, web, x_search, yuanbao]

# Profiles do not sandbox (ADR-27); anchor stray file ops inside the vault.
terminal:
  cwd: "{{VAULT_PATH}}"

# Write gate (ADR-28): the policy gate is a Python PLUGIN, not a shell hook.
# Hermes registers MCP tools as mcp_<server>_<tool>, so the native obsidian writes
# are mcp_obsidian_obsidian_append_content / _patch_content / _put_content; a shell hook (re.fullmatch
# "obsidian.*", consent-gated, fail-OPEN) never fired. The plugin runs in-process
# in every mode (-z/gateway/cron/ACP), matches in Python, gets the task_id, and is
# fail-CLOSED. policy_hook also hard-denies the native vault_delete/vault_move and
# command_execute (no path to gate). Deployed per lane by the installer; see
# .memoria/plugins/.
plugins:
  enabled:
    - memoria-policy-gate
