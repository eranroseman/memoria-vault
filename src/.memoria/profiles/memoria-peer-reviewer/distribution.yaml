# Hermes profile manifest. Read by `hermes profile install`; env_requires -> .env.EXAMPLE.
# Schema: hermes-agent.nousresearch.com/docs/user-guide/profile-distributions
name: memoria-peer-reviewer
version: 0.1.1
description: "Memoria Peer-reviewer — checks claims, citations, duplicates, and retractions; writes reports to projects/*/05-verification/."
author: "Memoria"
license: "MIT"
hermes_requires: ">=0.12.0"
env_requires:
  - name: KILOCODE_API_KEY
    description: "Kilo Code API key (kilo.ai) - model access for the shipped provider: kilocode."
    required: true
  - name: ANTHROPIC_API_KEY
    description: "Only needed if you switch config.yaml to provider: anthropic; unused by the shipped kilocode config."
    required: false
    default: ""
  - name: OBSIDIAN_API_KEY
    description: "Obsidian Local REST API key (64-char hex) — vault read + verification-report writes via the `obsidian` MCP server."
    required: true
  # Zotero: the `pyzotero` skill runs in local read-only mode against the Zotero
  # desktop API (http://localhost:23119) — no ZOTERO_API_KEY / _LIBRARY_ID /
  # _LIBRARY_TYPE needed. Add a Web API key only if you switch to the cloud API.
  - name: OBSIDIAN_MCP_PORT
    description: "Port of the Local REST API plugin's insecure HTTP server, where its native MCP is served (http://127.0.0.1:<port>/mcp). Must match insecurePort in the plugin's data.json (default 27123). Give a sandbox and a production vault distinct ports so both run at once (ADR-31)."
    required: false
    default: "27123"
  - name: OPENALEX_API_KEY
    description: "OpenAlex API key (?api_key= query param) — cross-checks during cite-check / retraction-check. As of 2026-02 OpenAlex requires a key; the former polite-pool email (OPENALEX_EMAIL) is discontinued."
    required: false
    default: ""
  - name: NCBI_EMAIL
    description: "Contact email used as the Crossref `mailto` (polite pool) when cite-check / retraction-check query api.crossref.org. Crossref and Open Retractions need no API key."
    required: false
    default: ""
  - name: SCITE_API_KEY
    description: "Scite API key (Authorization: Bearer) — optional citation-context and retraction signals. No shipped skill reads it yet; declared so it can be wired in without a profile change."
    required: false
    default: ""
