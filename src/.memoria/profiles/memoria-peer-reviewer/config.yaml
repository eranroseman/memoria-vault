# Generated by scripts/render_profile_configs.py; edit tool-registry.yaml.
_config_version: 30
context_file_max_chars: 30000
model:
  provider: '{{MODEL_PROVIDER}}'
  base_url: '{{MODEL_BASE_URL}}'
  default: '{{MODEL_DEFAULT}}'
  # {{MODEL_LOCAL_CONTEXT}}
mcp_servers:
  policy:
    command: '{{PYTHON}}'
    args: ['{{VAULT_PATH}}/.memoria/mcp/policy_mcp.py', --vault, '{{VAULT_PATH}}']
    timeout: 30
    tools:
      include: [check_permission, complete_write]
  obsidian:
    url: https://127.0.0.1:${OBSIDIAN_MCP_PORT}/mcp
    ssl_verify: ${OBSIDIAN_MCP_SSL_VERIFY}
    timeout: 30
    headers:
      Authorization: Bearer ${OBSIDIAN_API_KEY}
  pyzotero:
    command: pyzotero-mcp
    timeout: 30
    tools:
      include: [get_references, get_citations, find_related, search_semantic_scholar]
  qmd:
    command: '{{PYTHON}}'
    args: ['{{VAULT_PATH}}/.memoria/mcp/qmd_filter_mcp.py', --vault, '{{VAULT_PATH}}', --qmd, '{{QMD}}']
    timeout: 30
    connect_timeout: 45
    tools:
      include: [search, vsearch, deep_search, get, status]
tools:
  tool_search:
    enabled: auto
memory:
  memory_enabled: false
  user_profile_enabled: false
  write_approval: true
  provider: ''
skills:
  write_approval: true
  guard_agent_created: true
curator:
  enabled: false
platform_toolsets:
  cli: [skills, todo, policy, obsidian, pyzotero, qmd]
  cron: [skills, todo, policy, obsidian, pyzotero, qmd]
  api_server: [skills, todo, policy, obsidian, pyzotero, qmd]
  telegram: [skills, todo, policy, obsidian, pyzotero, qmd]
  discord: [skills, todo, policy, obsidian, pyzotero, qmd]
  slack: [skills, todo, policy, obsidian, pyzotero, qmd]
  whatsapp: [skills, todo, policy, obsidian, pyzotero, qmd]
  whatsapp_cloud: [skills, todo, policy, obsidian, pyzotero, qmd]
  signal: [skills, todo, policy, obsidian, pyzotero, qmd]
  bluebubbles: [skills, todo, policy, obsidian, pyzotero, qmd]
  email: [skills, todo, policy, obsidian, pyzotero, qmd]
  homeassistant: [skills, todo, policy, obsidian, pyzotero, qmd]
  mattermost: [skills, todo, policy, obsidian, pyzotero, qmd]
  matrix: [skills, todo, policy, obsidian, pyzotero, qmd]
  dingtalk: [skills, todo, policy, obsidian, pyzotero, qmd]
  feishu: [skills, todo, policy, obsidian, pyzotero, qmd]
  wecom: [skills, todo, policy, obsidian, pyzotero, qmd]
  wecom_callback: [skills, todo, policy, obsidian, pyzotero, qmd]
  qqbot: [skills, todo, policy, obsidian, pyzotero, qmd]
  yuanbao: [skills, todo, policy, obsidian, pyzotero, qmd]
  teams: [skills, todo, policy, obsidian, pyzotero, qmd]
  google_chat: [skills, todo, policy, obsidian, pyzotero, qmd]
agent:
  tool_use_enforcement: true
  disabled_toolsets: [browser, clarify, code_execution, computer_use, cronjob, delegation, file, homeassistant, image_gen, memory, messaging, moa, session_search, spotify, terminal, tts, video, video_gen, vision, web, x_search, yuanbao]
terminal:
  cwd: '{{VAULT_PATH}}'
plugins:
  enabled: [memoria-policy-gate]
