# Hermes profile manifest. Read by `hermes profile install`; env_requires -> .env.EXAMPLE.
# Schema: hermes-agent.nousresearch.com/docs/user-guide/profile-distributions
name: memoria-engineer
version: 0.1.1
description: "Memoria Engineer — scaffolds code notes, coordinates the external coding agent, and commits in projects/*/code/."
author: "Memoria"
license: "MIT"
hermes_requires: ">=0.12.0"
env_requires:
  - name: KILOCODE_API_KEY
    description: "Kilo Code API key (kilo.ai) - model access for the shipped provider: kilocode."
    required: true
  - name: ANTHROPIC_API_KEY
    description: "Anthropic API key — read by the `claude-code` external coding agent. Also the provider-switch key if config.yaml is set to provider: anthropic."
    required: false
    default: ""
  - name: OPENAI_API_KEY
    description: "OpenAI API key — read by the `codex` external coding agent."
    required: false
    default: ""
  - name: OBSIDIAN_API_KEY
    description: "Obsidian Local REST API key (64-char hex) — code-note read/write via the `obsidian` MCP server."
    required: true
  - name: OBSIDIAN_MCP_PORT
    description: "Port of the Local REST API plugin's insecure HTTP server, where its native MCP is served (http://127.0.0.1:<port>/mcp). Must match insecurePort in the plugin's data.json (default 27123). Give a sandbox and a production vault distinct ports so both run at once (ADR-31)."
    required: false
    default: "27123"
  - name: GITHUB_TOKEN
    description: "GitHub token (Authorization: Bearer) — repo APIs for the `github-repo-management` skill / external coding-agent handoff (push/PR). Optional for local-only work."
    required: false
    default: ""
