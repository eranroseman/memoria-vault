# memoria-engineer — code artifacts (git/repo)
# Per-profile Hermes config. Hermes reads model / mcp_servers / agent / terminal /
# plugins from THIS file (ADR-27). The installer substitutes the
# Python, vault, qmd, and model tokens at deploy time.
# Recommended: set agent.reasoning_effort per lane via `hermes -p memoria-engineer config set`.
model:
  provider: "{{MODEL_PROVIDER}}"
  base_url: "{{MODEL_BASE_URL}}"
  default: "{{MODEL_DEFAULT}}"
  # {{MODEL_LOCAL_CONTEXT}}

# Vault access + policy gate run as MCP servers — loaded ONLY from config.yaml
# mcp_servers (a standalone mcp.json is never read by Hermes; ADR-27 finding 1).
mcp_servers:
  policy:
    command: "{{PYTHON}}"
    args: ["{{VAULT_PATH}}/.memoria/mcp/policy_mcp.py", "--vault", "{{VAULT_PATH}}"]
    timeout: 30
    tools:
      include: [check_permission, complete_write]
  obsidian:
    # Native MCP from the Local REST API plugin over HTTPS (loopback). Replaces uvx
    # mcp-obsidian, which hardwired port 27124; the port lives in OBSIDIAN_MCP_PORT
    # (~/.hermes/.env) so a sandbox + a production vault can serve different ports
    # and coexist. OBSIDIAN_MCP_SSL_VERIFY points Hermes at the plugin's exported
    # PEM cert/CA bundle. The exact `Authorization: Bearer` header is required by
    # the plugin.
    url: "https://127.0.0.1:${OBSIDIAN_MCP_PORT}/mcp"
    ssl_verify: "${OBSIDIAN_MCP_SSL_VERIFY}"
    timeout: 30
    headers:
      Authorization: "Bearer ${OBSIDIAN_API_KEY}"

# Progressive tool catalog: keep MCP-heavy profiles cheap without hiding tools forever.
tools:
  tool_search:
    enabled: auto

# Worker lanes are stateless; Co-PI is the only Memoria profile with Hermes memory.
memory:
  memory_enabled: false
  user_profile_enabled: false
  write_approval: true
  provider: ""

skills:
  write_approval: true
  guard_agent_created: true

curator:
  enabled: false

# Policy sandbox (D40/ADR-46): agents reach the vault, operations, and APIs only
# through MCP. The Engineer is MCP-only too; external coding agents get execution
# isolation outside this profile.
platform_toolsets:
  cli: &memoria_engineer_toolsets [skills, todo, policy, obsidian]
  cron: *memoria_engineer_toolsets
  api_server: *memoria_engineer_toolsets
  telegram: *memoria_engineer_toolsets
  discord: *memoria_engineer_toolsets
  slack: *memoria_engineer_toolsets
  whatsapp: *memoria_engineer_toolsets
  whatsapp_cloud: *memoria_engineer_toolsets
  signal: *memoria_engineer_toolsets
  bluebubbles: *memoria_engineer_toolsets
  email: *memoria_engineer_toolsets
  homeassistant: *memoria_engineer_toolsets
  mattermost: *memoria_engineer_toolsets
  matrix: *memoria_engineer_toolsets
  dingtalk: *memoria_engineer_toolsets
  feishu: *memoria_engineer_toolsets
  wecom: *memoria_engineer_toolsets
  wecom_callback: *memoria_engineer_toolsets
  qqbot: *memoria_engineer_toolsets
  yuanbao: *memoria_engineer_toolsets
  teams: *memoria_engineer_toolsets
  google_chat: *memoria_engineer_toolsets

# Backstop only: platform_toolsets is the primary allowlist; this strips known
# direct-world families if a runtime path falls back to Hermes defaults.
agent:
  tool_use_enforcement: true
  disabled_toolsets: [browser, clarify, code_execution, computer_use, cronjob, delegation, file, homeassistant, image_gen, memory, messaging, moa, session_search, spotify, terminal, tts, video, video_gen, vision, web, x_search, yuanbao]

# Profiles do not sandbox (ADR-27); anchor stray file ops inside the vault.
terminal:
  cwd: "{{VAULT_PATH}}"

# Write gate (ADR-28): the policy gate is a Python PLUGIN, not a shell hook.
# Hermes registers MCP tools as mcp_<server>_<tool>, so the obsidian write is
# mcp_obsidian_vault_write / _append / _patch; a shell hook (re.fullmatch "obsidian.*",
# consent-gated, fail-OPEN) never fired. The plugin runs in-process in every mode
# (-z/gateway/cron/ACP), matches in Python, gets the task_id, and is fail-CLOSED.
# Deployed per lane by the installer (deploy_policy_plugin); see .memoria/plugins/.
plugins:
  enabled:
    - memoria-policy-gate
