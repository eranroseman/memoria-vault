# Hermes profile manifest. Read by `hermes profile install`; env_requires -> .env.EXAMPLE.
# Schema: hermes-agent.nousresearch.com/docs/user-guide/profile-distributions
name: memoria-copi
version: 0.1.0-alpha.2
description: "Memoria Co-PI — the one conversational agent (ADR-48): reflective thinking-partner, system explainer, and delegation front. Read-only across the vault; every write goes out as a kanban card; carries the memory/goals/skills loop."
author: "Memoria"
license: "MIT"
hermes_requires: ">=0.12.0"
env_requires:
  - name: KILOCODE_API_KEY
    description: "Kilo Code API key (kilo.ai) - model access for the shipped provider: kilocode."
    required: true
  - name: ANTHROPIC_API_KEY
    description: "Only needed if you switch config.yaml to provider: anthropic; unused by the shipped kilocode config."
    required: false
    default: ""
  - name: OBSIDIAN_API_KEY
    description: "Obsidian Local REST API key (64-char hex) — vault read via the `obsidian` MCP server (read tools only; the copi lane denies all writes)."
    required: true
  - name: OBSIDIAN_MCP_PORT
    description: "Port of the Local REST API plugin's insecure HTTP server, where its native MCP is served (http://127.0.0.1:<port>/mcp). Must match insecurePort in the plugin's data.json (default 27123). Give a sandbox and a production vault distinct ports so both run at once (ADR-31)."
    required: false
    default: "27123"
  - name: S2_API_KEY
    description: "Semantic Scholar API key — used by the ingest MCP's read/compute path when discussing a citekey."
    required: false
    default: ""
  - name: OPENALEX_API_KEY
    description: "OpenAlex key (optional; polite-pool email works too) — ingest MCP enrichment reads."
    required: false
    default: ""
  - name: NCBI_EMAIL
    description: "Contact email for NCBI/PMC requests (ingest MCP extract path)."
    required: false
    default: ""
