type: source
category: notes
gated: false
enums:
  lifecycle: [proposed, provisional, current, retracted, archived]
  evidence_level: [cebm-1, cebm-2, cebm-3, cebm-4, cebm-5, ungraded]
required:
  type: literal:source
  lifecycle: enum:lifecycle
  title: str
  entity: str # wikilink to the Catalog entity this note is about
optional:
  source_type: str
  evidence_level: enum:evidence_level
  research_area: list
  methodology: list
  links: map # authored, typed note-links (ADR-52)
  sample: bool
  created: date
creation:
  form:
    title: Memoria source capture
    name: memoria-source-capture
    fields:
      - name: title
        label: Source title
        required: true
        input:
          type: text
      - name: entity
        label: Catalog entity
        required: true
        input:
          type: note
          folder: catalog
      - name: source_type
        label: Source type
        required: true
        input:
          type: select
          values: [paper, dataset, repository, web-page, report]
      - name: evidence_level
        label: Evidence level
        input:
          type: select
          enum: evidence_level
      - name: research_area
        label: Research area
        input:
          type: multiselect
          vocabulary: research_area
      - name: methodology
        label: Methodology
        input:
          type: multiselect
          vocabulary: methodology
      - name: summary
        label: In my words
        input:
          type: textarea
