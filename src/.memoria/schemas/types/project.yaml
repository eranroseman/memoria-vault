type: project
category: projects
gated: false
initial_lifecycle: current
enums:
  lifecycle: [current, archived]
  output_mode: [thesis, survey]
  evidence_saturation: [unknown, unsaturated, saturated, stale]
  argument_stage: [cold-start, developing, mature]
required:
  type: literal:project
  lifecycle: enum:lifecycle
  title: str
  slug: str
  scope_topics: list
  inquiry: map
  finer: map
  output_mode: enum:output_mode
  question_version: int
  question_log: list
optional:
  active_thesis: str
  impact: int
  on_path: bool
  evidence_saturation: enum:evidence_saturation
  argument_stage: enum:argument_stage
  computed_at: date
  refutation_sufficiency: bool
  refutation_sufficiency_at: date
  sample: bool
  created: date
creation:
  form:
    title: Memoria project start
    name: memoria-project-start
    fields:
      - name: title
        label: Project title
        description: Bounded research question or working project name.
        required: true
        input:
          type: text
      - name: scope_topics
        label: Scope topics
        description: Controlled vocabulary topics that bound the project.
        required: true
        input:
          type: multiselect
          vocabulary: research_area
      - name: output_mode
        label: Output mode
        description: Thesis mode starts with a provisional answer; survey mode starts open.
        required: true
        input:
          type: select
          enum: output_mode
