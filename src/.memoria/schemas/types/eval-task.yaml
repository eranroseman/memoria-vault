type: eval-task
category: system
gated: false # gold tasks are diagnostic fixtures (ADR-11) — curated assets, not a gated write-zone
enums:
  lifecycle: [proposed, current, archived]
  # the board lane the eval card dispatches to (ADR-48 §4.1) — must stay a
  # subset of the lanes tasks_mcp.LANE_PROFILE routes (tests/test_eval.py guards parity)
  lane: [catalog, extract, link, map, draft, verify, code]
required:
  type: literal:eval-task
  title: str
  lifecycle: enum:lifecycle
  workflow: str # the capability under test (find · extract · link · verify · …)
  lane: enum:lane
optional:
  sample: bool
  created: date
  references: list # citekeys the task presupposes in the catalog (ingest them first)
