type: flag
category: inbox
gated: false
enums:
  lifecycle: [proposed, current, archived]
  agent_recommendation: [inconclusive, issues-found, clean] # the verdict IS the payload (ADR-51)
  loudness: [quiet, notice, alert, block]
required:
  type: literal:flag
  lifecycle: enum:lifecycle
  title: str
  finding: str # lead with the finding — verification verdicts are not a given
  agent_recommendation: enum:agent_recommendation
required_any: # a flag points at what it flags
  - target
  - citekey
optional:
  target: str
  citekey: str
  raised_by: str
  loudness: enum:loudness
  created: date
