# Calibrated thresholds — drift-bound (ADR-56; design guardrails §8).
# Every value here ships with the discipline: grounded, error-budgeted,
# recalibrated on model/source-version change, shadow-first.
entity_resolution:
  # Below the floor, ingest emits an Inbox near-tie flag instead of merging (ADR-56).
  confidence_floor: 0.85
  model_version: null # pin when an embedding/matching model is introduced
classify:
  # D21/ADR-54: classification is automated and audited, never a gate. A research
  # area applies silently only when the best OpenAlex topic score clears the floor
  # AND beats the runner-up by the near-tie margin; otherwise the field stays unset
  # and ingest raises one Inbox flag. Every decision lands in system/logs/classify.jsonl.
  confidence_floor: 0.6
  near_tie_margin: 0.15
  model_version: null # pin if a local topic model ever replaces OpenAlex topics
inbox:
  # #338: the archival sweep (operations/cleanup/archive_inbox.py) flips resolved
  # inbox cards (lifecycle: current/retracted with a `resolved:` stamp) to
  # lifecycle: archived once the stamp is older than this many days — the
  # verdict stays visible while fresh, then the card leaves active views.
  archive_after_days: 30
clustering:
  # Cluster-MCP parameters decide *how to display*, never what is canonical (D44/D48).
  embedding_model: null # pinned when the cluster MCP is configured
  umap_n_neighbors: 15
  hdbscan_min_cluster_size: 5
  seed: 42
  quality_thresholds:
    # #379: typed-graph/topic clustering can surface ranked maps only after these
    # are filled from reviewed map runs. Null thresholds mean shadow/report-only.
    production_enabled: false
    silhouette_floor: null
    topic_coherence_floor: null
    min_reviewed_maps: 20
    max_cluster_churn_rate: 0.15
    grounding_dataset: null
    model_version: null
hybrid_scores:
  candidate_rank:
    # #379 / ADR-66: ranking can reorder review attention only after real PI
    # decisions calibrate the score. Until then it may log shadow scores but must
    # not hide, auto-accept, or auto-defer candidates.
    production_enabled: false
    promote_threshold: null
    defer_threshold: null
    min_labeled_decisions: 200
    max_false_promote_rate: 0.05
    max_top_decile_miss_rate: 0.10
    grounding_dataset: null
    model_version: null
  outline_score:
    # Draft-outline scoring is advisory until calibrated against human accepted /
    # revised outcomes from real project drafts.
    production_enabled: false
    accept_threshold: null
    revise_threshold: null
    min_labeled_outlines: 50
    max_false_accept_rate: 0.05
    max_false_revise_rate: 0.15
    grounding_dataset: null
    model_version: null
