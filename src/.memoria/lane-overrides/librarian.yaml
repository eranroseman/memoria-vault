profile: memoria-librarian

# Allowlist wired to real Hermes/K-Dense skill IDs — adapt-not-wrap (2026-05-31).
# See https://eranroseman.github.io/memoria-vault/reference/installer/ § skills.

policy:
  allow:
    # External access is MCP-only (web disabled): discovery -> paper_search MCP, Zotero
    # reads -> pyzotero MCP (read-only; Zotero has no local write path), enrich/extract ->
    # ingest MCP (server-side). Retired the web-fetch K-Dense skills (paper-lookup, arxiv,
    # pyzotero, citation-management, literature-review, ocr-and-documents, rest-passthrough)
    # — their capabilities are served by the MCP servers or composed from them.
    skills:
      - obsidian-paper-note    # authored skill: the ingest pipeline (reaches the ingest + obsidian + pyzotero MCPs)
      - obsidian               # gated vault read/write
      - qmd                    # the `query` command (hybrid BM25+vector vault search; skills.sh skill, local)
    write:
      - "10-inbox/01-fleeting/**"      # discovery captures
      - "10-inbox/03-candidates/**"    # discovery candidates (02-answers is the Writer's)
      - "20-sources/**"
  deny:
    skills:
      - review_gated_publish
      - destructive_shell
    write:
      - "30-synthesis/**"
      - "40-workbench/**"
      - "50-deliverables/**"
  require:
    - audit_log
    - timeout_required
    - source_tracking

routing:
  invocation: dispatched
  external_api_policy: explicit_only    # blocked | explicit_only | open
  write_scope:
    - "10-inbox/01-fleeting/"
    - "10-inbox/03-candidates/"
    - "20-sources/"
