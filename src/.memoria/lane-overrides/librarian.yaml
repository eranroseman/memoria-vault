profile: memoria-librarian

# The Librarian's lane ceiling (ADR-48): four processing lanes — catalog · extract ·
# link · map — one faithful posture. It proposes into intake/staging zones and never
# touches the review-gated ones (notes/claims/, notes/hubs/ — ADR-47).
# External access is MCP-only (web disabled): discovery -> paper_search MCP, Zotero
# reads -> pyzotero MCP, enrich/extract -> ingest MCP, clustering -> cluster MCP.

policy:
  allow:
    skills:
      - obsidian               # gated vault read/write
      - qmd                    # hybrid BM25+vector vault search (the search engine)
    write:
      - "inbox/**"             # candidate / gap cards (the honesty body, ADR-51)
      - "catalog/**"           # entity records (the ingest engine writes; agent fills the LLM holes)
      - "notes/fleeting/**"    # discovery captures
      - "notes/source/**"      # proposed source notes (lifecycle: proposed)
  deny:
    skills:
      - review_gated_publish
      - destructive_shell
    write:
      - "notes/claims/**"      # review-gated (ADR-03/47)
      - "notes/hubs/**"        # review-gated
      - "notes/index/**"
      - "projects/**"
      - "system/**"
  require:
    - audit_log
    - timeout_required
    - source_tracking

routing:
  invocation: dispatched
  external_api_policy: explicit_only    # blocked | explicit_only | open
  write_scope:
    - "inbox/"
    - "catalog/"
    - "notes/fleeting/"
    - "notes/source/"
