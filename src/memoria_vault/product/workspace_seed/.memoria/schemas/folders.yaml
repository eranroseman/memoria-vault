# Canonical alpha.20 workspace layout.
# Read by: schema validators, `memoria init`, and worker/promotion code.
categories: [notes, hubs, projects, digests, fulltexts]
bundle_roots: [notes, hubs, projects, digests, fulltexts]

# type → folder-home (relative to the vault root)
homes:
  code-artifact: projects
  digest: digests
  fulltext: fulltexts
  note: notes
  hub: hubs
  project: projects

machine_staging_roots:
  - .memoria/staging/notes
  - .memoria/staging/hubs
  - .memoria/staging/projects
  - .memoria/staging/digests
  - .memoria/staging/fulltexts

quarantine_root: .memoria/quarantine

# transient — items here converge to archived/resolved and leave active views
transient_prefixes:
  - inbox/

# Runtime directories created by `memoria init`. Product seed files create their
# own parents; this list is only for writable runtime and user-content roots.
skeleton:
  - .memoria/index
  - .memoria/index/search
  - .memoria/config
  - .memoria/eval
  - .memoria/journal
  - .memoria/patterns
  - .memoria/quarantine
  - .memoria/blobs
  - .memoria/blobs/provider-payloads
  - .memoria/blobs/source-content
  - .memoria/staging/notes
  - .memoria/staging/hubs
  - .memoria/staging/projects
  - .memoria/staging/digests
  - .memoria/staging/fulltexts
  - inbox
  - notes
  - hubs
  - projects
  - digests
  - fulltexts
  - system
  - system/metrics
