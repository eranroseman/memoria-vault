version: 1
areas:
  - area: Type schema
    paths:
      - vault-template/.memoria/schemas/types/**
    inspect:
      - Matching template and folder home
      - Bases and dashboard queries
      - Linter and pre-commit behavior
      - Note-type and frontmatter documentation
    checks:
      - python -m pytest tests/test_schemas.py tests/test_templates.py tests/test_bases.py tests/test_precommit_schema.py tests/test_detectors.py
  - area: Folder home, staging/quarantine root, or skeleton
    paths:
      - vault-template/.memoria/schemas/folders.yaml
    inspect:
      - Type schemas and templates
      - Legacy policy and pattern fallback constants
      - Installer scaffold and golden-copy behavior
      - Dashboards and links
    checks:
      - python -m pytest tests/test_schemas.py tests/test_installer_skeleton.py tests/test_policy_mcp.py tests/test_patterns.py tests/test_detectors.py
  - area: Profile capability or path policy
    paths:
      - vault-template/.memoria/tool-registry.yaml
      - vault-template/.memoria/lane-overrides/**
      - vault-template/.memoria/profiles/**
    inspect:
      - Tool registry and matching profile config
      - Lane override and delegation ceiling
      - MCP availability and direct-world prohibitions
      - Profile posture and profile-owned skills
    checks:
      - python -m pytest tests/test_profiles.py tests/test_policy_mcp.py tests/test_policy_hook.py tests/test_tasks_mcp.py tests/test_skill_state_dashboard.py
  - area: Runtime policy
    paths:
      - vault-template/.memoria/mcp/policy_mcp.py
      - vault-template/.memoria/mcp/policy_server.py
      - vault-template/.memoria/mcp/policy_hook.py
      - vault-template/.memoria/plugins/memoria-policy-gate/**
      - src/memoria_vault/runtime/policy/**
    inspect:
      - Lane overrides and legacy gated-prefix fallback
      - Audit contract
      - Mutating Obsidian tool mappings
      - Tasks delegation semantics
    checks:
      - python -m pytest tests/test_policy_mcp.py tests/test_policy_hook.py tests/test_tasks_mcp.py tests/test_schemas.py
  - area: Runtime helpers
    paths:
      - src/memoria_vault/runtime/vaultio.py
      - src/memoria_vault/runtime/jsonl.py
      - src/memoria_vault/runtime/time.py
      - src/memoria_vault/runtime/paths.py
      - vault-template/.memoria/mcp/_shared.py
    inspect:
      - Frontmatter parsing behavior and PyYAML-free fallback
      - JSONL append/iterate tolerance and parent creation
      - UTC timestamp format expected by telemetry/audit rows
      - Runtime modules that still carry duplicate helper code
    checks:
      - python -m pytest tests/test_runtime_helpers.py tests/test_package_spine.py
      - python -m pytest tests/test_loudness.py tests/test_project_structural_impact.py tests/test_test_env_harness.py
  - area: Ingest or linter operation
    paths:
      - vault-template/.memoria/operations/processing/ingest/**
      - vault-template/.memoria/operations/integrity/linter/**
      - vault-template/.memoria/mcp/ingest_mcp.py
    inspect:
      - Calibration and schemas
      - Inbox card contract and shared writers
      - Extract store and source/entity linking
      - Cron wrappers and dashboard fields
    checks:
      - python -m pytest tests/test_pipeline.py tests/test_ingest_mcp.py tests/test_inbox_cards.py tests/test_detectors.py
  - area: Installer
    paths:
      - scripts/install.sh
      - scripts/install/**
      - scripts/install.ps1
    inspect:
      - Installer reference docs
      - Profile deployment and substitutions
      - Disposable-vault behavior
      - PowerShell bridge
    checks:
      - bash -n scripts/install.sh
      - python -m pytest tests/test_installer_skeleton.py
      - bash scripts/e2e-smoke.sh
  - area: Bundled Obsidian plugin provenance
    paths:
      - vault-template/.obsidian/community-plugins.json
      - vault-template/.obsidian/plugin-provenance-lock.json
      - vault-template/.obsidian/plugins/**
      - scripts/plugin_provenance_doctor.py
    inspect:
      - Enabled plugin roster and bundled plugin directories
      - Lock entry metadata, manifest versions, and SHA-256 artifact digests
      - Undeclared executable artifacts under bundled plugin directories
      - ADR-74 and Obsidian plugin reference wording
    checks:
      - python scripts/plugin_provenance_doctor.py
      - python -m pytest tests/test_plugin_provenance.py
  - area: Offline e2e smoke harness
    paths:
      - scripts/e2e-smoke.sh
      - scripts/e2e_smoke.py
      - scripts/test_env_harness.py
      - tests/fixtures/test-env/**
    inspect:
      - Stage names and ordering
      - Disposable-vault assembly assertions
      - Workflow-replay artifacts and deny audit row
      - Shell entrypoint compatibility
    checks:
      - python -m pytest tests/test_e2e_smoke_helpers.py tests/test_test_env_harness.py
      - bash scripts/e2e-smoke.sh
  - area: Live Hermes L2 smoke
    paths:
      - scripts/test-l2.sh
      - scripts/l2_smoke.py
      - scripts/l2_openai_smoke_server.py
      - scripts/l2_obsidian_mcp_shim.py
    inspect:
      - Hermes profile/config assumptions from upstream docs
      - Disposable vault isolation and temporary HERMES_HOME behavior
      - Deterministic OpenAI-compatible smoke backend
      - Filesystem-backed Obsidian MCP shim tool names
      - Policy-gate plugin deployment and audit assertions
    checks:
      - bash scripts/test-l2.sh --help
      - python -m pytest tests/test_l2_smoke.py
      - bash scripts/test-l2.sh --preflight-only
  - area: Testing gate mechanism
    paths:
      - scripts/verify
      - scripts/test.sh
      - scripts/e2e-smoke.sh
      - scripts/test-l2.sh
      - .github/workflows/**
      - .github/ruleset-contract.yaml
      - .agents/playbooks/release.md
    inspect:
      - CONTRIBUTING testing and verification guidance
      - Verify-change and release playbooks
      - Release evidence and manual follow-up wording
      - Required-check roster and scripts/verify mode behavior
    checks:
      - python scripts/status_doctor.py
      - python scripts/agents_doctor.py
  - area: GitHub workflow or PR policy
    paths:
      - .github/workflows/**
      - .github/scripts/pr_policy.py
    inspect:
      - Required-check invariant and ruleset assumptions
      - Permissions, event trust, and concurrency
      - Safe and sensitive paths
      - Trusted authors
    checks:
      - python scripts/ruleset_doctor.py
      - python -m pytest tests/test_pr_policy.py tests/test_ruleset_doctor.py
  - area: Documentation or agent guidance
    paths:
      - docs/**
      - .agents/**
      - AGENTS.md
    inspect:
      - Section indexes and guide maps
      - Frontmatter, links, and terminology
      - Referenced commands and repository paths
      - Generated agent references
    checks:
      - python scripts/docs_doctor.py docs
      - bash scripts/check-vault-links.sh
      - python scripts/status_doctor.py
      - python scripts/agents_doctor.py
      - npx --yes cspell@8.19.4 lint --no-progress --no-must-find-files --gitignore "**/*.md"
