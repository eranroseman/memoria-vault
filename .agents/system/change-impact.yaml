version: 1
areas:
  - area: Type schema
    paths:
      - vault-template/.memoria/schemas/types/**
    inspect:
      - Matching template and folder home
      - Bases and dashboard queries
      - Linter and pre-commit behavior
      - Note-type and frontmatter documentation
    checks:
      - python3 -m pytest tests/test_schemas.py tests/test_templates.py tests/test_bases.py tests/test_precommit_schema.py tests/test_detectors.py
  - area: Folder home, staging/quarantine root, or skeleton
    paths:
      - vault-template/.memoria/schemas/folders.yaml
    inspect:
      - Type schemas and templates
      - Review-gate and pattern fallback constants
      - Installer scaffold and golden-copy behavior
      - Dashboards and links
    checks:
      - python3 -m pytest tests/test_schemas.py tests/test_installer_skeleton.py tests/test_runtime_policy.py tests/test_patterns.py tests/test_detectors.py
  - area: Dropped installed profile package
    paths:
      - scripts/checks/alpha14_negative_gate.py
      - tests/test_profiles.py
      - tests/test_installer_skeleton.py
    inspect:
      - Alpha.14 no-profile negative tests
      - Installer/profile-mode text
      - Current docs that still describe shipped installed profiles
      - Optional adapter follow-up scope
    checks:
      - python3 -m pytest tests/test_profiles.py tests/test_installer_skeleton.py
  - area: Runtime policy
    paths:
      - vault-template/.memoria/plugins/memoria-policy-gate/**
      - src/memoria_vault/runtime/policy/**
    inspect:
      - Actor policy config loading
      - Review-gated prefix fallback
      - Audit contract
      - Optional adapter tool mappings
      - Fail-closed direct tool denial
    checks:
      - python3 -m pytest tests/test_runtime_policy.py tests/test_policy_hook.py tests/test_policy_gate_plugin.py tests/test_policy_gate_completeness.py tests/test_schemas.py
  - area: Runtime helpers
    paths:
      - src/memoria_vault/runtime/vaultio.py
      - src/memoria_vault/runtime/jsonl.py
      - src/memoria_vault/runtime/time.py
      - src/memoria_vault/runtime/paths.py
    inspect:
      - Frontmatter parsing behavior and PyYAML-free fallback
      - JSONL append/iterate tolerance and parent creation
      - UTC timestamp format expected by telemetry/audit rows
      - Runtime modules that still carry duplicate helper code
    checks:
      - python3 -m pytest tests/test_runtime_helpers.py tests/test_package_spine.py
      - python3 -m pytest tests/test_loudness.py tests/test_project_structural_impact.py tests/test_test_env_harness.py
  - area: Capture or linter operation
    paths:
      - src/memoria_vault/runtime/capture.py
      - src/memoria_vault/runtime/subsystems/integrity/linter/**
    inspect:
      - Calibration and schemas
      - Inbox card contract and shared writers
      - Source catalog state and content/blob writes
      - Scheduled-task wrappers and dashboard fields
    checks:
      - python3 -m pytest tests/test_capture.py tests/test_inbox_cards.py tests/test_detectors.py
  - area: Installer
    paths:
      - scripts/install.sh
      - scripts/install/**
      - scripts/install.ps1
    inspect:
      - Installer reference docs
      - No installed-profile deployment modes
      - Disposable-workspace behavior
      - PowerShell bridge
    checks:
      - bash -n scripts/install.sh
      - python3 -m pytest tests/test_installer_skeleton.py
      - bash scripts/sandbox/e2e_smoke.py
  - area: Dropped Obsidian baseline payload
    paths:
      - vault-template/**
      - scripts/checks/plugin_provenance_doctor.py
    inspect:
      - Standalone template does not ship editor plugin bundles
      - QuickAdd command scripts and Obsidian workspace files stay absent
      - Optional adapter wording does not become baseline behavior
      - Alpha.14 negative gate covers deleted payload contracts
    checks:
      - python3 scripts/checks/plugin_provenance_doctor.py
      - python3 -m pytest tests/test_plugin_provenance.py
  - area: Offline e2e smoke harness
    paths:
      - scripts/sandbox/e2e_smoke.py
      - scripts/sandbox/e2e_smoke.py
      - scripts/sandbox/test_env_harness.py
      - tests/fixtures/test-env/**
    inspect:
      - Stage names and ordering
      - Disposable-vault assembly assertions
      - Workflow-replay artifacts and deny audit row
      - Shell entrypoint compatibility
    checks:
      - python3 -m pytest tests/test_e2e_smoke_helpers.py tests/test_test_env_harness.py
      - bash scripts/sandbox/e2e_smoke.py
  - area: Standalone disposable install harness
    paths:
      - scripts/sandbox/install-test-vault-local-llm.sh
    inspect:
      - Disposable workspace isolation and guarded wipe checks
      - Standalone installer invocation and package import checks
      - Optional OpenAI-compatible endpoint preflight wording
      - Golden-copy, detector, and CLI doctor assertions
    checks:
      - bash scripts/sandbox/install-test-vault-local-llm.sh --help
      - python3 -m pytest tests/test_install_test_vault_local_llm.py
  - area: Testing gate mechanism
    paths:
      - scripts/verify
      - scripts/sandbox/e2e_smoke.py
      - .github/workflows/**
      - .github/ruleset-contract.yaml
      - .agents/playbooks/release.md
    inspect:
      - CONTRIBUTING testing and verification guidance
      - Verify-change and release playbooks
      - Release evidence and manual follow-up wording
      - Required-check roster and scripts/verify mode behavior
    checks:
      - python3 scripts/checks/status_doctor.py
      - python3 scripts/checks/agents_doctor.py
  - area: GitHub workflow or PR policy
    paths:
      - .github/workflows/**
      - .github/scripts/pr_policy.py
    inspect:
      - Required-check invariant and ruleset assumptions
      - Permissions, event trust, and concurrency
      - Safe and sensitive paths
      - Trusted authors
    checks:
      - python3 scripts/checks/ruleset_doctor.py
      - python3 -m pytest tests/test_pr_policy.py tests/test_ruleset_doctor.py
  - area: Documentation or agent guidance
    paths:
      - docs/**
      - .agents/**
      - AGENTS.md
    inspect:
      - Section indexes and guide maps
      - Frontmatter, links, and terminology
      - Referenced commands and repository paths
      - Generated agent references
    checks:
      - python3 scripts/checks/docs_doctor.py docs
      - python3 scripts/checks/docs_doctor.py --vault-links
      - python3 scripts/checks/status_doctor.py
      - python3 scripts/checks/agents_doctor.py
      - npm run spellcheck
