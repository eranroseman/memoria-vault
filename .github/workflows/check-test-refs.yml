name: check-test-refs

# Drift guard for the test protocols: every path/link a protocol references must
# resolve. Protocols rot when the design moves under them (a renamed/dissolved
# path they still cite). Runs unconditionally on every push/PR — if it is ever
# promoted to a required check, a path filter would leave non-test PRs blocked.

on:
  push:
  pull_request:

jobs:
  check-test-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check test-protocol references resolve
        run: python scripts/check-test-refs.py
