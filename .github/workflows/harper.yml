name: harper

# Advisory grammar check over text-heavy files (docs/, vault/, root *.md).
# Non-blocking — runs as an informational check, not a merge gate.
# SpellCheck is disabled (cSpell owns that); Harper covers grammar/style rules.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  harper:
    name: harper grammar (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Install harper-cli
        run: |
          curl -fsSL https://github.com/Automattic/harper/releases/latest/download/harper-cli-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C /usr/local/bin harper-cli
      - name: Run harper
        run: |
          find docs vault -name '*.md' -not -path '*/_site/*' -not -path '*/.jekyll-cache/*' \
               -not -path '*/.obsidian/*' | sort | \
          xargs harper-cli lint --no-spell-check || true
          find . -maxdepth 1 -name '*.md' | sort | \
          xargs harper-cli lint --no-spell-check || true
