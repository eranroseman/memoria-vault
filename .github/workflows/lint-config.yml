name: lint-config

# Lints the config/markup layer that the runtime and CI depend on:
#   yamllint      — profile config.yaml, lane-overrides, cron, workflows, issue
#                   templates (a bad indent / duplicate key breaks the agent or CI)
#   actionlint    — the GitHub workflows specifically (bad action refs, ${{ }}
#                   expression typos, shell bugs inside run: blocks)
#   json-validate — the authored .json (.obsidian/*.json, markdownlint configs):
#                   a malformed config silently breaks Obsidian / tooling
#
# All run unconditionally (no `paths:` filter) so they can back required checks —
# same rationale as docs-doctor / python-selftest. See AGENTS.md §4.

on:
  push:
  pull_request:

jobs:
  yamllint:
    name: yamllint (config + workflows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install --quiet yamllint==1.38.0
      - name: yamllint tracked YAML (excludes vault/.obsidian, uses .yamllint)
        run: git ls-files '*.yaml' '*.yml' | grep -v 'vault/\.obsidian/' | xargs -r yamllint

  actionlint:
    name: actionlint (.github/workflows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

  json-validate:
    name: json syntax (authored)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: validate authored JSON
        run: |
          rc=0
          for f in $(git ls-files '*.json' | grep -v '.obsidian/plugins/'); do
            python -m json.tool "$f" >/dev/null || { echo "invalid JSON: $f"; rc=1; }
          done
          [ "$rc" -eq 0 ] && echo "all authored JSON valid"
          exit "$rc"
