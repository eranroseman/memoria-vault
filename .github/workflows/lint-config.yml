name: lint-config

# Lints the config/markup layer that the runtime and CI depend on:
#   actionlint    — the GitHub workflows specifically (bad action refs, ${{ }}
#                   expression typos, shell bugs inside run: blocks)
#
# All run unconditionally (no `paths:` filter) so they can back required checks —
# same rationale as docs-doctor / python-selftest. See AGENTS.md §4.
# Yamllint now runs inside the required `lint` check via scripts/test.sh l0.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint-config:
    name: lint-config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color
