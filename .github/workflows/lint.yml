name: lint

# Runs the L0 source gate from scripts/test.sh: ruff, docs/reference checks,
# repo doctors, syntax checks, and schema/design drift. No `paths:` filter —
# reports on every PR (AGENTS.md §4).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install lint dependencies
        run: python -m pip install --quiet -r requirements-dev.txt
      - name: Run L0 source gate
        run: bash scripts/test.sh l0
