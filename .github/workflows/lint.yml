name: lint

# One job for the fast Python checks — ruff, docs-doctor, docs-links (vault link
# resolution), check-test-refs — sharing a single runner + checkout + Python
# setup instead of four separate workflows. Replaces ruff.yml, docs-doctor.yml,
# docs-links.yml, check-test-refs.yml.
#
# RULESET COORDINATION (required before merge): the branch ruleset still requires
# `docs-doctor` and `docs-links` by name. Update Settings → Rules → Rulesets →
# "main" → Require status checks: remove `docs-doctor` and `docs-links`, add
# `lint`. (ruff + check-test-refs were advisory; folding them in makes them gate,
# which is intended.) No `paths:` filter — reports on every PR (AGENTS.md §4).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Install lint dependencies
        run: python -m pip install --quiet -r requirements-dev.txt
      - name: ruff
        # Keep this aligned with scripts/test.sh and .pre-commit-config.yaml.
        run: ruff check memoria scripts src/.memoria .github/scripts tests
      - name: ruff-format
        # Layout is enforced by `ruff format`; this fails if anything is unformatted.
        run: ruff format --check memoria scripts src/.memoria .github/scripts tests
      - name: docs-doctor
        run: python scripts/docs_doctor.py docs
      - name: profile-reference
        run: python scripts/gen_profiles_ref.py --check
      - name: docs-links
        run: bash scripts/check-vault-links.sh
      - name: check-test-refs
        run: python scripts/check_test_refs.py
      - name: status-doctor
        run: python scripts/status_doctor.py
      - name: adr-code-doctor
        run: python scripts/adr_code_doctor.py
      - name: agents-doctor
        run: python scripts/agents_doctor.py
      - name: github-doctor
        run: python scripts/github_doctor.py
      - name: ruleset contract
        run: python scripts/ruleset_doctor.py
      - name: plugin-provenance-doctor
        run: python scripts/plugin_provenance_doctor.py
      - name: test-runner paths
        run: bash scripts/test.sh check   # L1 module paths in test.sh resolve (drift guard)
