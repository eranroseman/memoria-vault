name: PR Review Gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

# contents:write is required for gh pr merge --auto.
# pull-requests:write is required for posting the review comment.
# No elevated secrets are used; pr_policy.py only reads PR metadata via API.
# Kilo Code Review is polled via GH API (check-runs), no extra secrets needed.
permissions:
  contents: write
  pull-requests: write

jobs:
  pr-policy:
    name: pr-policy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Evaluate PR policy
        id: policy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
        run: python .github/scripts/pr_policy.py >> "$GITHUB_OUTPUT"

      - name: Post policy summary
        uses: actions/github-script@v7
        env:
          DECISION: ${{ steps.policy.outputs.decision }}
          REASON: ${{ steps.policy.outputs.reason }}
        with:
          script: |
            const decision = process.env.DECISION;
            const reason   = process.env.REASON;
            const icon = { auto_approve: '✅', needs_human: '👤', block: '🚫' }[decision] ?? '❓';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `### PR policy\n${icon} **${decision}** — ${reason}`,
            });

      - name: Wait for Kilo Code Review
        id: kilo-review
        if: steps.policy.outputs.decision == 'auto_approve'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          commit_sha='${{ github.event.pull_request.head.sha }}'
          for i in $(seq 1 24); do
            conclusion=$(gh api \
              "repos/${{ github.repository }}/commits/$commit_sha/check-runs" \
              --jq '[.check_runs[] | select(.name == "Kilo Code Review") | .conclusion] | last // empty')
            if [ -z "$conclusion" ]; then
              echo "Waiting for Kilo Code Review to start... ($i/24)"
              sleep 30
            elif [ "$conclusion" = "null" ]; then
              echo "Kilo Code Review in progress... ($i/24)"
              sleep 30
            else
              echo "kilo-conclusion=$conclusion" >> "$GITHUB_OUTPUT"
              echo "Kilo Code Review finished: $conclusion"
              exit 0
            fi
          done
          echo "kilo-conclusion=timeout" >> "$GITHUB_OUTPUT"
          echo "Kilo Code Review did not complete within 12 minutes — failing safe."
          exit 1

      - name: Enable auto-merge (clean review)
        if: |
          steps.policy.outputs.decision == 'auto_approve' &&
          (steps.kilo-review.outputs.kilo-conclusion == 'success' || steps.kilo-review.outputs.kilo-conclusion == 'skipped' || steps.kilo-review.outputs.kilo-conclusion == 'neutral')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --auto --squash

      - name: Block (Code Review found warnings)
        if: |
          steps.policy.outputs.decision == 'auto_approve' &&
          steps.kilo-review.outputs.kilo-conclusion != 'success' &&
          steps.kilo-review.outputs.kilo-conclusion != 'skipped' &&
          steps.kilo-review.outputs.kilo-conclusion != 'neutral'
        run: |
          echo "Kilo Code Review blocked merge (conclusion: ${{ steps.kilo-review.outputs.kilo-conclusion }})."
          echo "Review findings at https://app.kilo.ai/code-reviews"
          exit 1

      - name: Fail check (blocked PRs — policy)
        if: steps.policy.outputs.decision == 'block'
        run: |
          echo "PR blocked by policy: ${{ steps.policy.outputs.reason }}"
          exit 1
