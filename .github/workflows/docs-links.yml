name: docs-links

# Verifies every docs/ reference under vault/ resolves (Pages URLs map to a real
# docs file; no banned github blob URLs). This is the unbypassable CI backstop for
# the per-diff .githooks/pre-commit guard — programmatic commits (obsidian-git
# auto-backup) and --no-verify skip the hook, but cannot skip a required check.
#
# Required status check, so it must report on EVERY PR (no `paths:` filter) or
# path-unrelated PRs would be permanently blocked on a check that never reports.
# See AGENTS.md §4.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  docs-links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Check vault/ docs references resolve
        run: bash scripts/check-vault-links.sh
