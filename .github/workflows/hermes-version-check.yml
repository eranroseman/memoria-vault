name: weekly Hermes version check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  open-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Open weekly reminder issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TITLE: "Weekly Hermes version check"
        run: |
          if gh issue list --repo "$REPO" --state open --search "\"$TITLE\" in:title" --json number --jq 'length' | grep -qx '0'; then
            gh issue create --repo "$REPO" --title "$TITLE" --body-file - <<'EOF'
          Weekly reminder to check whether Memoria should stay on the installed Hermes version.

          Checklist:

          - [ ] Record `hermes --version`
          - [ ] Compare with the latest upstream Hermes release
          - [ ] Read changelog entries newer than the installed version
          - [ ] Decide: stay pinned, test-upgrade in `~/Memoria-test`, or open an upgrade checkpoint
          - [ ] If testing/upgrading, run:
            - `python src/.memoria/mcp/hermes_contract_doctor.py --vault /home/eranr/Memoria-test --json`
            - `python src/.memoria/mcp/board_export.py --cost-doctor`
            - profile redeploy
            - one live deny-path test
            - one Obsidian/MCP smoke pass

          Close this issue after the decision is recorded.
          EOF
          fi
