name: docs-doctor

# Structural lint for docs/. This is a REQUIRED status check in the branch
# ruleset, so it must run (and report) on EVERY push/PR — not just doc changes.
# A required check that is path-filtered never reports on non-docs PRs, which
# leaves them permanently "blocked". The lint is fast and idempotent, so running
# it unconditionally is the correct trade-off.

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  docs-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run docs-doctor
        run: python scripts/docs-doctor.py docs
