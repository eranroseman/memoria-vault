name: docs-doctor

# Structural lint for docs/. This is a REQUIRED status check in the branch
# ruleset, so it must report on EVERY PR — not just doc changes.
# A required check that is path-filtered never reports on non-docs PRs, which
# leaves them permanently "blocked". The lint is fast and idempotent, so running
# it unconditionally is the correct trade-off.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  docs-doctor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Run docs-doctor
        run: python scripts/docs-doctor.py docs
