name: markdownlint

# A curated set of *structural* markdownlint rules over docs/ — each catches a
# real rendering bug, convention-agnostically, so (unlike the rest of markdownlint)
# they have no Obsidian false positives:
#   MD011  reversed link syntax  (text)[url]
#   MD039  spaces inside link text  [ text ](url)
#   MD042  empty links            [text]()
#   MD056  table column count      (a row with the wrong cell count drops data)
#   MD058  blanks around tables    (a table glued to text fails to render)
# The shared `.markdownlint.json` holds exactly these five structural rules, so the
# editor, pre-commit (Block 9), and CI all enforce an identical set. Style rules
# (e.g. MD013 line-length) stay the editor's job — added editor-only via the
# `markdownlint.config` key in .vscode/settings.json, never gating here.
#
# Runs unconditionally (no `paths:` filter) so it can back a required check —
# same rationale as docs-doctor / python-selftest. See AGENTS.md §4.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install pinned Node dev tools
        run: npm ci --ignore-scripts
      - name: markdownlint structural rules over docs/
        run: npm run markdownlint
