name: cspell

# Spell-check the markdown prose surface using the same pre-commit-managed hook
# that runs locally. Scope is owned entirely by cspell.json (`files` +
# `ignorePaths` + `enableGlobDot`). cSpell is the only spelling gate; Harper
# remains an editor hint.
#
# Runs unconditionally (no `paths:` filter) so it can back a required check —
# same rationale as docs-doctor / markdownlint / python-selftest. See AGENTS.md §4.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  cspell:
    name: cspell
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install pre-commit
        run: python -m pip install pre-commit==4.6.0
      - name: cspell over prose markdown
        # Scope lives only in cspell.json: `files: ["**/*.md"]` selects all markdown,
        # `enableGlobDot: true` reaches dot-directories like vault-template/.memoria/ and
        # .agents/ that a plain `**` glob would skip, and `ignorePaths` holds
        # every exclusion.
        run: pre-commit run cspell --all-files
