name: cspell

# Spell-check the markdown prose surface using the pinned repo-local cspell
# dependency plus the shared root cspell.json and project-words.txt dictionary.
# Scope is owned entirely by cspell.json (`files` + `ignorePaths` +
# `enableGlobDot`) — see the package script below. cSpell is the only spelling
# gate; Harper remains an editor hint.
#
# Runs unconditionally (no `paths:` filter) so it can back a required check —
# same rationale as docs-doctor / markdownlint / python-selftest. See AGENTS.md §4.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  cspell:
    name: cspell
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install pinned Node dev tools
        run: npm ci --ignore-scripts
      - name: cspell over prose markdown
        # Scope lives only in cspell.json: `files: ["**/*.md"]` selects all markdown,
        # `enableGlobDot: true` reaches dot-directories like .agents/ and
        # .agents/ that a plain `**` glob would skip, and `ignorePaths` holds every
        # exclusion. `--gitignore` keeps this to tracked files. The pre-commit hook
        # defers to the same cspell.json, so there is no file list to keep aligned.
        run: npm run spellcheck
