name: cspell

# Spell-check over the prose surface (docs/ + src/ + root markdown) using the
# shared root cspell.json and the project-words.txt dictionary. cSpell is the
# sole speller (Harper's SpellCheck linter is disabled in the editor, and harper
# CI runs --no-spell-check) — this is the only place spelling actually gates.
#
# Runs unconditionally (no `paths:` filter) so it can back a required check —
# same rationale as docs-doctor / markdownlint / python-selftest. See AGENTS.md §4.
#
# RULESET COORDINATION: to make this blocking, add `cspell` to the branch
# ruleset's required status checks (Settings → Rules → Rulesets → main).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  cspell:
    name: cspell (docs/ + src/ + root markdown)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
      - name: cspell over prose markdown
        # Same file set as the pre-commit `cspell` hook (docs/ + src/ + root
        # markdown, including dot-directories like src/.memoria/ that a `**`
        # glob would skip) so the gate is identical in both places.
        run: git ls-files '*.md' | grep -E '^(docs/|src/|[^/]+\.md$)' | xargs npx --yes cspell@8.19.4 lint --no-progress --no-must-find-files
