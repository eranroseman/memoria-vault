name: cspell

# Spell-check the markdown prose surface using the shared root cspell.json and the
# project-words.txt dictionary. Scope is owned entirely by cspell.json (`files` +
# `ignorePaths` + `enableGlobDot`) — see the step below. cSpell is the
# sole speller (Harper's SpellCheck linter is disabled in the editor, and harper
# CI runs --no-spell-check) — this is the only place spelling actually gates.
#
# Runs unconditionally (no `paths:` filter) so it can back a required check —
# same rationale as docs-doctor / markdownlint / python-selftest. See AGENTS.md §4.
#
# RULESET COORDINATION: to make this blocking, add `cspell` to the branch
# ruleset's required status checks (Settings → Rules → Rulesets → main).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  cspell:
    name: cspell
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: cspell over prose markdown
        # Scope lives only in cspell.json: `files: ["**/*.md"]` selects all markdown,
        # `enableGlobDot: true` reaches dot-directories like src/.memoria/ and
        # .agents/ that a plain `**` glob would skip, and `ignorePaths` holds every
        # exclusion. `--gitignore` keeps this to tracked files. The pre-commit hook
        # defers to the same cspell.json, so there is no file list to keep aligned.
        run: npx --yes cspell@8.19.4 lint --no-progress --no-must-find-files --gitignore "**/*.md"
