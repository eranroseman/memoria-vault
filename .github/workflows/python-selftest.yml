name: python-selftest

# Runs the L1 pytest suite (tests/) for the vault's Python tooling + repo scripts
# against the real runtime deps, then runs the offline e2e smoke.
#
# The policy hook lives in the runtime package; dev test tooling installs the
# package extras needed by component tests.
#
# This backs a REQUIRED status check, so — like docs-doctor and lint-installers —
# it must report on EVERY PR (no `paths:` filter), or path-unrelated PRs would
# be permanently blocked on a check that never reports. See AGENTS.md §4.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  python-selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
      - name: Install runtime + dev test deps
        # runtime deps so the modules import; dev deps provide pytest and shared tooling.
        run: |
          python -m pip install --quiet -r requirements-dev.txt
          python -m pip install --quiet -e .
      - name: Run L1 component tests
        run: bash scripts/test.sh l1

      - name: E2E smoke (offline vault build + the Library loop)
        # Builds a vault from vault-template/ exactly as the installer would, then walks
        # scaffold -> golden -> commit gate -> offline ingest -> attention prompt ->
        # lint. Caught two real bugs the unit suite missed; pure-local, no network.
        run: bash scripts/e2e-smoke.sh
