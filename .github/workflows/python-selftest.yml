name: python-selftest

# Runs the L1 pytest suite (tests/) for the vault's Python tooling + repo scripts
# against the real runtime deps (ADR-44), then gates dashboard schema-drift over the
# real src/ tree (a dashboard querying a field no template emits shows an empty
# table forever — silent, so CI must catch it).
#
# policy_mcp degrades without PyYAML, but policy_hook's test writes a lane YAML and
# needs it to load — so we install runtime requirements (mcp + PyYAML) plus the
# repo-side dev test tooling rather than rely on stdlib-only behavior.
#
# This backs a REQUIRED status check, so — like docs-doctor and lint-installers —
# it must report on EVERY PR (no `paths:` filter), or path-unrelated PRs would
# be permanently blocked on a check that never reports. See AGENTS.md §4.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  python-selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            src/.memoria/mcp/requirements.txt
      - name: Install runtime + dev test deps
        # runtime deps so the modules import; dev deps provide pytest and shared tooling.
        run: |
          python -m pip install --quiet -r requirements-dev.txt
          python -m pip install --quiet -r src/.memoria/mcp/requirements.txt
      - name: Run L1 component tests (pytest)
        # ADR-44: the former per-module --self-test suites now live in tests/.
        run: python -m pytest tests/ -q
      - name: Check ADR index is current
        run: python scripts/gen-adr-index.py --check
      - name: Gate dashboard schema-drift (real vault)
        # Only dashboard-field-drift blocks; vault content findings (broken
        # wikilinks, schema-check) stay advisory — they're not this gate's job.
        run: |
          python src/.memoria/operations/integrity/linter/detectors.py \
            --vault src --gate dashboard-field-drift

      - name: E2E smoke (offline vault build + the Library loop)
        # Builds a vault from src/ exactly as the installer would, then walks
        # scaffold -> golden -> commit gate -> offline ingest -> honesty card ->
        # lint. Caught two real bugs the unit suite missed; pure-local, no network.
        run: bash scripts/e2e-smoke.sh
