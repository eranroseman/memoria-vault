name: verify

# The single required code-validation check: scripts/verify (lint, product
# gates, tests, offline smoke, syntax). No `paths:` filter — a required check
# must report on every PR, or a path-unrelated PR is permanently blocked. The
# `push: main` run validates the post-merge state.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
      - name: Install runtime + dev tooling
        run: |
          python -m pip install --quiet -r requirements-dev.txt
          python -m pip install --quiet -e .
      - name: Cache pre-commit environments
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-
      - name: Cache PSScriptAnalyzer module
        id: pssa-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.local/share/powershell/Modules/PSScriptAnalyzer
          key: ${{ runner.os }}-psscriptanalyzer-v1-${{ hashFiles('scripts/PSScriptAnalyzerSettings.psd1') }}
          restore-keys: |
            ${{ runner.os }}-psscriptanalyzer-v1-
      - name: Install PSScriptAnalyzer
        if: steps.pssa-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
      - name: Run verify
        run: python scripts/verify
