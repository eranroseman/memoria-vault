name: lint-installers

# shellcheck + PSScriptAnalyzer are REQUIRED status checks in the branch ruleset,
# so they must report on EVERY PR — not just install-script changes.
# A required check that is path-filtered never reports on unrelated PRs, leaving
# them permanently "blocked". The linters are fast and idempotent, so running them
# unconditionally is the correct trade-off (same rationale as docs-doctor).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck (scripts/install.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          scandir: "."
          additional_files: "scripts/install.sh scripts/install/manifest.sh scripts/install/runtime-tools.sh"
          severity: warning

  psscriptanalyzer:
    name: PSScriptAnalyzer (scripts/install.ps1)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Cache PSScriptAnalyzer module
        id: pssa-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.local/share/powershell/Modules/PSScriptAnalyzer
          key: ${{ runner.os }}-psscriptanalyzer-v1-${{ hashFiles('scripts/PSScriptAnalyzerSettings.psd1') }}
          restore-keys: |
            ${{ runner.os }}-psscriptanalyzer-v1-
      - name: Install PSScriptAnalyzer
        if: steps.pssa-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
      - name: Analyze scripts/install.ps1
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path scripts/install.ps1 -Severity Warning,Error -Settings ./scripts/PSScriptAnalyzerSettings.psd1
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }
