name: Lint installers

# shellcheck + PSScriptAnalyzer are REQUIRED status checks in the branch ruleset,
# so they must run (and report) on EVERY push/PR — not just install-script changes.
# A required check that is path-filtered never reports on unrelated PRs, leaving
# them permanently "blocked". The linters are fast and idempotent, so running them
# unconditionally is the correct trade-off (same rationale as docs-doctor).

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: shellcheck (install.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          additional_files: "install.sh"
          severity: warning

  psscriptanalyzer:
    name: PSScriptAnalyzer (install.ps1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
      - name: Analyze install.ps1
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path install.ps1 -Severity Warning,Error -Settings ./PSScriptAnalyzerSettings.psd1
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }
