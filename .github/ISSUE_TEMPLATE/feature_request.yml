name: Feature Request
description: Propose a new workflow, capability, CLI behavior, or optional adapter for Memoria
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Use this form for new features, CLI/engine improvements, documentation improvements,
        or any change that goes beyond fixing a bug.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / engine behavior
        - Optional adapter
        - Operation or capability
        - Install / setup experience
        - Package seed or workspace structure
        - AGENTS.md / .agents guidance
        - Documentation (docs/)
        - Tooling / scripts
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What gap or friction does this address?
      placeholder: |
        There is no CLI workflow for reviewing legal/contract sources with the
        same citation checks as research papers.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see added or changed.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: dropdown
    id: willing_to_contribute
    attributes:
      label: Are you willing to open a PR for this?
      options:
        - "Yes"
        - "Yes, with guidance"
        - "No"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, mockups, related issues, prior art.
