name: Bug Report
description: Report a broken or unexpected behavior in Memoria
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below
        so we can reproduce and fix the issue quickly.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Memoria is affected?
      options:
        - Install script (scripts/install.sh / scripts/install.ps1)
        - CLI / engine behavior
        - Optional adapter
        - Agent guidance (AGENTS.md / .agents)
        - Vault structure / templates
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: adapter
    attributes:
      label: Optional adapter (if applicable)
      description: "Which optional adapter or external tool is involved?"
      placeholder: editor adapter

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run `memoria workspace check --workspace <path>`, the command exits 0 even though a generated file was edited directly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: The command should report the quarantined generated file and exit nonzero.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Clone the repo
        2. Run `bash scripts/install.sh`
        3. Run `memoria workspace check --workspace <path>`
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (native)
        - WSL2 (Windows 11)
        - macOS (unsupported)
        - Windows (PowerShell only)
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, related issues, workarounds you found.
