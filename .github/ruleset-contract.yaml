version: 1
ruleset_name: main
required_checks:
  - pr-policy
  - lint
  - shellcheck (scripts/install.sh)
  - PSScriptAnalyzer (scripts/install.ps1)
  - python-selftest
  - cspell
  - lint-config
  - markdownlint
workflow_jobs:
  pr-policy: .github/workflows/pr-review-gate.yml
  lint: .github/workflows/lint.yml
  shellcheck (scripts/install.sh): .github/workflows/lint-installers.yml
  PSScriptAnalyzer (scripts/install.ps1): .github/workflows/lint-installers.yml
  python-selftest: .github/workflows/python-selftest.yml
  cspell: .github/workflows/cspell.yml
  lint-config: .github/workflows/lint-config.yml
  markdownlint: .github/workflows/markdownlint.yml
