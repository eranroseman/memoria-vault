# Dependabot version-update PRs for the dependency surfaces that exist: GitHub
# Actions pinned in .github/workflows/, contributor/CI Python tooling at the
# repo root, and pinned pre-commit hook environments.
# Monthly + a small PR cap keeps the noise low; commit messages use the `chore`
# prefix. Every bump PR is reviewed and merged by a person (no auto-merge).
# (Security-fix PRs from Dependabot alerts are separate and not gated here.)
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
    groups:
      dev-python:
        patterns: ["*"]

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
    groups:
      hook-tools:
        patterns: ["*"]
