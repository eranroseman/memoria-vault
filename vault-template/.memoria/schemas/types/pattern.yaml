type: pattern
category: system
gated: false # patterns are gated ASSETS via review, not a gated write-zone
initial_lifecycle: proposed
enums:
  lifecycle: [proposed, current, archived]
  mode: [library, project, both]
required:
  type: literal:pattern
  lifecycle: enum:lifecycle
  title: str
  posture: str # which agent posture runs it (ADR-53)
  mode: enum:mode
  action: str
  input: str
  output_target: str # staging-only; the runner refuses gated zones
optional:
  model_hint: str
  version: str
  adapted_from: str
  sample: bool
  created: date
