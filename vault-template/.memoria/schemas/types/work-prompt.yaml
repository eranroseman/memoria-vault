type: work-prompt
category: inbox
gated: false
initial_lifecycle: proposed
enums:
  lifecycle: [proposed, current, archived]
  loudness: [quiet, notice, alert, block]
  prompt_kind: [review, worklist, nudge, blocked]
required:
  type: literal:work-prompt
  lifecycle: enum:lifecycle
  title: str
  action: str # what the PI should do — never a verdict (ADR-51)
  what_happened: str # what finished/triggered the prompt
required_any: # a prompt points at where to look
  - target
  - task_id
optional:
  prompt_kind: enum:prompt_kind
  target: str # output path(s) to review
  task_id: str # the board card the prompt is about
  lane: str # which lane finished
  raised_by: str
  loudness: enum:loudness
  sample: bool
  created: date
