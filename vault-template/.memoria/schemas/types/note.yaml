type: note
category: notes
gated: false
enums:
  mode: [claim, question, definition, work]
  question_status: [open, resolved]
  certainty: [reported, contested, unknown, hypothesized]
  item_type: [paper, dataset, repository, web-page, report]
required:
  type: literal:note
  id: ulid
  title: str
  tags: list
  links: links
optional:
  aliases: list
  annotation_ref: map
  archived: bool
  claim_text: str
  description: str
  extraction_confidence: str
  item_type: enum:item_type
  mode: enum:mode
  question_status: enum:question_status
  quote: str
  work_id: str
  temporal_scope: str
  tense: str
  topics: list
  qualifier: str
  certainty: enum:certainty
  superseded: bool
  reading: str
  anchors: list
  todo: list
  x: map
required_when:
  claim_text:
    field: mode
    equals: claim
  question_status:
    field: mode
    equals: question
  work_id:
    field: mode
    equals: work
forbidden: [citations, evidence_set, citekey, project]
