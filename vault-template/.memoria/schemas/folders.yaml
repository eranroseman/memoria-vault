# Canonical alpha.18 workspace layout.
# Read by: schema validators, the installer skeleton, and worker/promotion code.
categories: [notes, hubs, projects, digests, fulltext]
bundle_roots: [notes, hubs, projects, digests, fulltext]

# type → folder-home (relative to the vault root)
homes:
  digest: digests
  fulltext: fulltext
  note: notes
  hub: hubs
  project: projects

machine_staging_roots:
  - .memoria/staging/notes
  - .memoria/staging/hubs
  - .memoria/staging/projects
  - .memoria/staging/digests
  - .memoria/staging/fulltext

quarantine_root: .memoria/quarantine

# transient — items here converge to archived/resolved and leave active views
transient_prefixes:
  - inbox/

# the full installer skeleton (content dirs get .gitkeep; ADR-125)
skeleton:
  - .memoria/index
  - .memoria/index/search
  - .memoria/audit
  - .memoria/config
  - .memoria/eval
  - .memoria/journal
  - .memoria/patterns
  - .memoria/quarantine
  - .memoria/blobs
  - .memoria/blobs/provider-payloads
  - .memoria/blobs/source-content
  - .memoria/staging/notes
  - .memoria/staging/hubs
  - .memoria/staging/projects
  - .memoria/staging/digests
  - .memoria/staging/fulltext
  - .memoria/templates
  - inbox
  - notes
  - hubs
  - projects
  - digests
  - fulltext
  - system
  - system/incidents
  - system/metrics
