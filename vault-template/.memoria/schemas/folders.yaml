# Canonical alpha.12 workspace layout.
# Read by: schema validators, the installer skeleton, and worker/promotion code.
categories: [catalog, knowledge, capabilities]
bundle_roots: [catalog, knowledge, capabilities]

# type → folder-home (relative to the vault root)
homes:
  source: catalog/sources
  person: catalog/entities
  organization: catalog/entities
  venue: catalog/entities
  digest: knowledge/digests
  note: knowledge/notes
  hub: knowledge/hubs
  project: knowledge/projects
  operation: capabilities/operations
  skill: capabilities/skills
  mcp: capabilities/mcp
  workflow: capabilities/workflows

machine_staging_roots:
  - .memoria/staging/catalog
  - .memoria/staging/knowledge
  - .memoria/staging/capabilities

quarantine_root: .memoria/quarantine

# transient — items here converge to archived/resolved and leave active views
transient_prefixes:
  - inbox/

# the full installer skeleton (content dirs get .gitkeep; ADR-55)
skeleton:
  - .memoria/index
  - .memoria/index/qmd
  - .memoria/audit
  - .memoria/config
  - .memoria/quarantine
  - .memoria/blobs
  - .memoria/blobs/provider-payloads
  - .memoria/blobs/source-content
  - .memoria/staging/catalog
  - .memoria/staging/knowledge
  - .memoria/staging/capabilities
  - journal
  - catalog
  - catalog/sources
  - catalog/entities
  - knowledge
  - knowledge/digests
  - knowledge/notes
  - knowledge/hubs
  - knowledge/projects
  - knowledge/views
  - capabilities
  - capabilities/operations
  - capabilities/skills
  - capabilities/mcp
  - capabilities/workflows
  - system/exports
  - system/exports/assets
  - system/logs
  - system/logs/sessions
  - system/metrics
  - system/dashboards
