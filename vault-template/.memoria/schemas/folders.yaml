# Canonical alpha.15 workspace layout.
# Read by: schema validators, the installer skeleton, and worker/promotion code.
categories: [knowledge]
bundle_roots: [knowledge]

# type → folder-home (relative to the vault root)
homes:
  note: knowledge/notes
  work: knowledge/works
  hub: knowledge/hubs
  project: knowledge/projects

machine_staging_roots:
  - .memoria/staging/knowledge

quarantine_root: .memoria/quarantine

# transient — items here converge to archived/resolved and leave active views
transient_prefixes:
  - inbox/

# the full installer skeleton (content dirs get .gitkeep; ADR-55)
skeleton:
  - .memoria/index
  - .memoria/index/qmd
  - .memoria/audit
  - .memoria/config
  - .memoria/quarantine
  - .memoria/blobs
  - .memoria/blobs/provider-payloads
  - .memoria/blobs/source-content
  - .memoria/staging/knowledge
  - journal
  - catalog
  - catalog/sources
  - catalog/entities
  - knowledge
  - knowledge/works
  - knowledge/notes
  - knowledge/hubs
  - knowledge/projects
  - knowledge/views
  - system/exports
  - system/exports/assets
  - system/logs
  - system/logs/sessions
  - system/metrics
  - system/dashboards
