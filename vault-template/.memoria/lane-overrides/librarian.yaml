profile: memoria-librarian

# The Librarian's alpha.11 lane ceiling: catalog · extract · link · map. Machine
# outputs are worker write-requests staged under .memoria/staging/; the worker
# promotes checked Concepts into catalog/ or knowledge/.
# External access is MCP-only (web disabled): discovery -> paper_search MCP, Zotero
# reads -> pyzotero MCP, enrich/extract -> ingest MCP, clustering -> cluster MCP.

policy:
  allow:
    skills:
      - obsidian               # vault read; direct write tools are not granted
      - qmd                    # hybrid BM25+vector vault search (the search engine)
    write: []
  deny:
    skills:
      - review_gated_publish
      - destructive_shell
    write:
      - "catalog/**"
      - "knowledge/**"
      - "capabilities/**"
      - "inbox/**"
      - "system/**"
  require:
    - audit_log
    - timeout_required
    - source_tracking

routing:
  invocation: dispatched
  external_api_policy: explicit_only    # blocked | explicit_only | open
  write_scope:
    - ".memoria/staging/catalog/"
    - ".memoria/staging/knowledge/"
