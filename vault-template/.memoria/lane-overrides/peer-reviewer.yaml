profile: memoria-peer-reviewer

# The Peer-reviewer's alpha.11 lane ceiling: independent verification. It reports
# through worker-owned flags/attention projections, not direct Inbox card writes.

policy:
  allow:
    skills:
      - obsidian
      - qmd
    write: []
  deny:
    skills:
      - review_gated_publish
      - destructive_shell
    write:
      - "knowledge/**"
      - "catalog/**"
      - "capabilities/**"
      - "inbox/**"
      - "system/**"
  require:
    - audit_log
    - timeout_required
    - source_tracking

routing:
  invocation: dispatched
  external_api_policy: explicit_only
  write_scope: []
