profile: memoria-writer

# The Writer's lane ceiling (ADR-48): generative, draft-only, review-gated. Drafts
# live in project scratch; nothing lands in the review-gated knowledge zones.

policy:
  allow:
    skills:
      - obsidian
      - qmd
    write:
      - "projects/**"          # drafts + outlines (project scratch)
  deny:
    skills:
      - review_gated_publish
      - destructive_shell
    write:
      - "notes/claims/**"      # review-gated (ADR-03/47)
      - "notes/hubs/**"
      - "catalog/**"
      - "inbox/**"             # the Writer raises no cards (its Inbox column is —)
      - "system/**"
  require:
    - audit_log
    - timeout_required

routing:
  invocation: dispatched
  external_api_policy: blocked
  write_scope:
    - "projects/"
