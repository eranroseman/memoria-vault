profile: memoria-writer

# Deferred in alpha.11: the writing/draft/export module is not routable and has
# no write ceiling until a later checkpoint re-enables it.

policy:
  allow:
    skills:
      - obsidian
      - qmd
    write: []
  deny:
    skills:
      - review_gated_publish
      - destructive_shell
    write:
      - "knowledge/**"
      - "catalog/**"
      - "capabilities/**"
      - "inbox/**"             # the Writer raises no cards (its Inbox column is —)
      - "system/**"
  require:
    - audit_log
    - timeout_required

routing:
  invocation: dispatched
  external_api_policy: blocked
  write_scope: []
