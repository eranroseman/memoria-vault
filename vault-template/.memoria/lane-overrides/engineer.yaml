profile: memoria-engineer

# Deferred in alpha.11: the coding/autonomy lane is not routable and has no
# write ceiling until a later checkpoint re-enables it.

policy:
  allow:
    skills:
      - obsidian
    write: []
  deny:
    skills:
      - review_gated_publish
    write:
      - "knowledge/**"
      - "catalog/**"
      - "capabilities/**"
      - "inbox/**"
      - "system/**"
  require:
    - audit_log
    - timeout_required

routing:
  invocation: dispatched
  external_api_policy: explicit_only
  write_scope: []
