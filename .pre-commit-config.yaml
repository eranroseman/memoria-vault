# Memoria pre-commit configuration.
# Install once per clone:  pre-commit install   (run via  bash scripts/dev-setup.sh)
# Run manually over all files:  pre-commit run --all-files
# Skip a single hook once:  SKIP=<hook-id> git commit
# Bypass everything (rarely):  git commit --no-verify

repos:
  # ---------------------------------------------------------------------------
  # Official hooks (pre-commit/pre-commit-hooks)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Block 0: no direct commits to main (main is PR-protected; block, don't warn)
      - id: no-commit-to-branch
        args: [--branch, main]
      # Block 8: JSON syntax check (exclude vendored Obsidian plugin files)
      - id: check-json
        exclude: src/\.obsidian/plugins/

  # ---------------------------------------------------------------------------
  # ruff (Python linter) — production, tooling, and tests.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        files: ^scripts/|^src/\.memoria/|^\.github/scripts/|^tests/

  # ---------------------------------------------------------------------------
  # yamllint  —  Block 7
  # ---------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        exclude: src/\.obsidian/

  # ---------------------------------------------------------------------------
  # shellcheck  —  Block 2 partial
  # ---------------------------------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        files: ^scripts/install\.sh$|^scripts/install/.*\.sh$

  # ---------------------------------------------------------------------------
  # Local hooks
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      # Block 1: docs-doctor
      - id: docs-doctor
        name: docs-doctor
        language: system
        entry: python scripts/docs_doctor.py docs
        files: ^docs/|^scripts/docs-doctor\.py
        pass_filenames: false

      # Block 2 partial: bash syntax check for install.sh
      - id: bash-syntax
        name: bash-syntax
        language: system
        entry: bash -n scripts/install.sh scripts/install/manifest.sh scripts/install/runtime-tools.sh
        files: ^scripts/install\.sh$|^scripts/install/.*\.sh$
        pass_filenames: false

      # Block 3 partial: pytest
      - id: pytest
        name: pytest
        language: system
        entry: env PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest tests/ -q
        files: \.py$
        pass_filenames: false

      # Block 4: docs reference resolution
      - id: check-doc-refs
        name: check-doc-refs
        language: system
        entry: bash scripts/check-doc-refs.sh
        files: \.(md|py|ya?ml)$
        pass_filenames: true

      # Block 5: test-plan reference resolution
      - id: check-test-refs
        name: check-test-refs
        language: system
        entry: python scripts/check_test_refs.py
        files: ^docs/testing/.*\.md$|^scripts/check-test-refs\.py$
        pass_filenames: false

      # Block 6: dashboard schema-drift
      - id: dashboard-schema-drift
        name: dashboard-schema-drift
        language: system
        entry: python src/.memoria/operations/integrity/linter/detectors.py --vault src --gate dashboard-field-drift
        files: ^src/system/dashboards/.*\.md$|^src/system/templates/.*\.md$
        pass_filenames: false

      # Block 9: markdownlint structural rules
      - id: markdownlint-structural
        name: markdownlint-structural
        language: system
        entry: npx --yes markdownlint-cli@0.42.0 --config .markdownlint.json
        files: ^docs/.*\.md$
        exclude: (^|/)tmp/   # scratch dirs: tracked, not linted (see .markdownlintignore)
        pass_filenames: true

      # Block 9b: cspell spell-check (all tracked markdown)
      # Triggers on any changed .md; scope/exclusions are owned by cspell.json
      # (files + ignorePaths + enableGlobDot), so there is no file list to mirror
      # against .github/workflows/cspell.yml.
      - id: cspell
        name: cspell
        language: system
        entry: npx --yes cspell@8.19.4 lint --no-progress --no-must-find-files
        files: \.md$
        pass_filenames: true

      # Block 10: ADR index current
      - id: adr-index
        name: adr-index
        language: system
        entry: python scripts/gen_adr_index.py --check
        files: ^docs/adr/.*\.md$|^scripts/gen_adr_index\.py$
        pass_filenames: false

      # Block 11: status-doctor
      - id: status-doctor
        name: status-doctor
        language: system
        entry: python scripts/status_doctor.py
        files: ^docs/(releasing|testing|contributing)/.*\.md$|^\.agents/playbooks/release\.md$|^scripts/status-doctor\.py$
        pass_filenames: false

      - id: agents-doctor
        name: agents-doctor
        language: system
        entry: python scripts/agents_doctor.py
        files: ^(\.agents/|\.claude/|\.codex/|\.kilo/|AGENTS\.md$|scripts/agents-doctor\.py$|src/\.memoria/(profiles|lane-overrides)/)
        pass_filenames: false

      - id: github-doctor
        name: github-doctor
        language: system
        entry: python scripts/github_doctor.py
        files: ^\.github/(ISSUE_TEMPLATE/|dependabot\.yml$)|^scripts/github-doctor\.py$
        pass_filenames: false

      # Block 12: harper grammar (advisory — always exits 0)
      - id: harper-grammar
        name: harper-grammar
        language: system
        entry: bash scripts/harper-advisory.sh
        files: \.(md|txt|rst)$
        exclude: src/\.obsidian/
        pass_filenames: true
        verbose: true
