# Memoria pre-commit configuration.
# Install once per clone:  pre-commit install --install-hooks   (or run scripts/dev/setup.sh)
# Run manually over all files:  pre-commit run --all-files
# Skip a single hook once:  SKIP=<hook-id> git commit
# Bypass everything (rarely):  git commit --no-verify

repos:
  - repo: local
    hooks:
      # Block 0: no direct commits to main (main is PR-protected; block, don't warn)
      - id: no-commit-to-branch
        name: no-commit-to-branch
        language: system
        entry: no-commit-to-branch --branch main
        always_run: true
        pass_filenames: false

      # Block 8: JSON syntax check
      - id: check-json
        name: check json
        language: system
        entry: check-json
        files: \.json$

      - id: gitleaks
        name: gitleaks
        language: system
        entry: gitleaks protect --staged --redact --verbose
        always_run: true
        pass_filenames: false

      - id: ruff
        name: ruff
        language: system
        entry: ruff check --force-exclude
        files: ^src/memoria_vault/.*\.py$|^scripts/.*\.py$|^vault-template/\.memoria/.*\.py$|^\.github/scripts/.*\.py$|^tests/.*\.py$

      - id: ruff-format
        name: ruff format
        language: system
        entry: ruff format --force-exclude
        files: ^src/memoria_vault/.*\.py$|^scripts/.*\.py$|^vault-template/\.memoria/.*\.py$|^\.github/scripts/.*\.py$|^tests/.*\.py$

      - id: yamllint
        name: yamllint
        language: system
        entry: yamllint
        files: \.(yaml|yml)$

      - id: shellcheck
        name: shellcheck
        language: system
        entry: shellcheck --severity=warning
        files: ^scripts/install\.sh$|^scripts/install/.*\.sh$

      # Block 1: docs-doctor
      - id: docs-doctor
        name: docs-doctor
        language: system
        entry: python scripts/checks/docs_doctor.py docs
        files: ^docs/|^scripts/checks/docs_doctor\.py
        pass_filenames: false

      # Block 2 partial: bash syntax check for install.sh
      - id: bash-syntax
        name: bash-syntax
        language: system
        entry: bash -n scripts/install.sh scripts/install/manifest.sh
        files: ^scripts/install\.sh$|^scripts/install/.*\.sh$
        pass_filenames: false

      # Block 3 partial: fast pytest collection. Full tests run in scripts/verify pr and CI.
      - id: pytest
        name: pytest-collect
        language: system
        entry: python scripts/verify check
        files: \.py$
        pass_filenames: false

      # Block 4: docs reference resolution
      - id: check-doc-refs
        name: check-doc-refs
        language: system
        entry: python scripts/checks/docs_doctor.py --doc-refs
        files: \.(md|py|ya?ml)$
        pass_filenames: true

      # Block 6: dashboard schema-drift
      - id: dashboard-schema-drift
        name: dashboard-schema-drift
        language: system
        entry: env PYTHONPATH=src python -m memoria_vault.runtime.subsystems.integrity.linter.detectors --vault vault-template --gate dashboard-field-drift
        files: ^vault-template/system/dashboards/.*\.md$|^vault-template/system/templates/.*\.md$
        pass_filenames: false

      # Block 9: markdownlint structural rules
      - id: markdownlint-structural
        name: markdownlint-structural
        language: system
        entry: bash -lc 'PATH=node_modules/.bin:$PATH markdownlint --config .markdownlint.json "$@"' --
        files: ^docs/.*\.md$
        exclude: (^|/)tmp/   # scratch dirs: tracked, not linted (see .markdownlintignore)
        pass_filenames: true

      # Block 9b: cspell spell-check (tracked prose markdown)
      # Triggers on any changed .md; scope/exclusions are owned by cspell.json
      # (files + ignorePaths + enableGlobDot), so there is no file list to mirror
      # against .github/workflows/cspell.yml.
      - id: cspell
        name: cspell
        language: system
        entry: bash -lc 'PATH=node_modules/.bin:$PATH cspell lint --no-progress --no-must-find-files "$@"' --
        files: \.md$
        pass_filenames: true

      # Block 10: ADR index current
      - id: adr-index
        name: adr-index
        language: system
        entry: python scripts/checks/gen_adr_index.py --check
        files: ^docs/adr/.*\.md$|^scripts/checks/gen_adr_index\.py$
        pass_filenames: false

      # Block 11: status-doctor
      - id: status-doctor
        name: status-doctor
        language: system
        entry: python scripts/checks/status_doctor.py
        files: ^CONTRIBUTING\.md$|^\.agents/playbooks/(release|verify-change|exec-plan)\.md$|^\.agents/templates/.*\.md$|^releases/.*\.md$|^scripts/checks/status_doctor\.py$
        pass_filenames: false

      - id: agents-doctor
        name: agents-doctor
        language: system
        entry: python scripts/checks/agents_doctor.py
        files: ^(\.agents/|\.claude/|\.codex/|\.kilo/|AGENTS\.md$|scripts/checks/agents_doctor\.py$)
        pass_filenames: false

      - id: github-doctor
        name: github-doctor
        language: system
        entry: python scripts/checks/github_doctor.py
        files: ^\.github/(ISSUE_TEMPLATE/|dependabot\.yml$)|^scripts/checks/github_doctor\.py$
        pass_filenames: false

      - id: plugin-provenance-doctor
        name: plugin-provenance-doctor
        language: system
        entry: python scripts/checks/plugin_provenance_doctor.py
        files: ^vault-template/\.obsidian/(community-plugins\.json|plugin-provenance-lock\.json|plugins/)|^scripts/checks/plugin_provenance_doctor\.py$|^tests/test_plugin_provenance\.py$
        pass_filenames: false
