# Memoria pre-commit configuration.
#
# Two commit-stage hooks fire on `git commit` (gitleaks, no-commit-to-branch);
# every other hook is manual-stage and fires only through `scripts/verify`
# (`pre-commit run --hook-stage manual`). This keeps the pinned/cached hook
# environments as the single source of the lint tools while `verify` owns the
# gate order. Install once per clone:  pre-commit install --install-hooks
# (or run scripts/dev/setup.sh). Bypass everything once:  git commit --no-verify
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        args: [--branch, main]
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        files: ^src/memoria_vault/.*\.py$|^scripts/.*\.py$|^tests/.*\.py$
        stages: [manual]

      - id: ruff-format
        files: ^src/memoria_vault/.*\.py$|^scripts/.*\.py$|^tests/.*\.py$
        stages: [manual]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        files: \.(yaml|yml)$
        stages: [manual]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        files: ^scripts/install\.sh$|^scripts/install/.*\.sh$
        stages: [manual]

  - repo: local
    hooks:
      # markdownlint + cspell gate published docs prose (not the docs/superpowers
      # working records). Node hooks; deps pinned so no npx/npm ci is needed.
      - id: markdownlint-structural
        name: markdownlint-structural
        language: node
        entry: markdownlint --config .markdownlint.json
        additional_dependencies: [markdownlint-cli@0.49.0]
        files: ^docs/.*\.md$
        exclude: ^docs/superpowers/
        stages: [manual]

      # Scope/exclusions are owned by cspell.json (files + ignorePaths +
      # enableGlobDot); there is no file list to mirror here.
      - id: cspell
        name: cspell
        language: node
        entry: cspell lint --no-progress --no-must-find-files
        additional_dependencies: [cspell@10.0.1]
        files: \.md$
        stages: [manual]
